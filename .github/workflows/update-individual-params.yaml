name: update-individual-params

on:
  workflow_dispatch:
    inputs:
      pr_base_branch:
        description: Target branch to which the Pull Request will be opened (base branch)
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-22.04

    steps:
      # Generate a GitHub App token from stored secrets
      - name: Generate GitHub App token
        id: generate-token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      # Checkout the repository at the specified base branch
      - name: Checkout repository (base branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.pr_base_branch }}
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      # Configure git user for commit and display status
      - name: Show current git info
        run: |
          git --version
          git config user.name "autoupdate-bot[bot]"
          git config user.email "autoupdate-bot[bot]@users.noreply.github.com"
          git status

      # Extract the current commit hash of autoware/individual_params from autoware.repos
      - name: Read current SHA from autoware.repos
        id: current-sha
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: yq '.repositories["autoware/individual_params"].version' autoware.repos

      # Retrieve the latest commit hash from the main branch of autoware_individual_params.j6_gen2
      - name: Fetch latest SHA from upstream main
        id: latest-sha
        env:
          TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          set -euo pipefail
          LATEST_SHA=$(git ls-remote https://x-access-token:${TOKEN}@github.com/tier4/autoware_individual_params.j6_gen2.git refs/heads/main | awk '{print $1}')
          if [ -z "${LATEST_SHA}" ]; then
            echo "Failed to fetch latest SHA" >&2
            exit 1
          fi
          echo "latest_sha=${LATEST_SHA}" >> "$GITHUB_OUTPUT"

      # Print both SHAs for visibility
      - name: Print SHAs
        run: |
          echo "Current  : ${{ steps.current-sha.outputs.result }}"
          echo "Upstream : ${{ steps.latest-sha.outputs.latest_sha }}"

      # Update autoware.repos only if the SHAs are different
      - name: Update autoware.repos (only if different)
        if: ${{ steps.current-sha.outputs.result != steps.latest-sha.outputs.latest_sha }}
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: |
            NEW_SHA='${{ steps.latest-sha.outputs.latest_sha }}' \
            yq -i '.repositories["autoware/individual_params"].version = strenv(NEW_SHA)' autoware.repos

      # Check if there are any changes in autoware.repos
      - name: Check diff
        id: diff
        run: |
          if git diff --quiet -- autoware.repos; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git add autoware.repos
          fi

      # Stop early if there is no change
      - name: No change — exit
        if: ${{ steps.diff.outputs.changed == 'false' }}
        run: |
          echo "autoware/individual_params is already up to date. No PR will be created."

      # Create a Pull Request if the SHA was updated
      - name: Create Pull Request
        if: ${{ steps.diff.outputs.changed == 'true' }}
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}
          base: ${{ github.event.inputs.pr_base_branch }}
          branch: chore/update-individual-params-${{ github.event.inputs.pr_base_branch }}
          title: "chore: update individual_params to latest main"
          body: |
            This PR updates `autoware/individual_params` in `autoware.repos` to the latest commit on `main`.
            https://github.com/tier4/autoware_individual_params.j6_gen2/commits/main/
            - previous: [${{ steps.current-sha.outputs.result }}](https://github.com/tier4/autoware_individual_params.j6_gen2/commit/${{ steps.current-sha.outputs.result }})
            - latest  : [${{ steps.latest-sha.outputs.latest_sha }}](https://github.com/tier4/autoware_individual_params.j6_gen2/commit/${{ steps.latest-sha.outputs.latest_sha }})

            Auto-generated by workflow **update-individual-params**.
          commit-message: |
            chore: bump autoware/individual_params to ${{ steps.latest-sha.outputs.latest_sha }}
          add-paths: |
            autoware.repos
          signoff: true
          delete-branch: true

      # Enable auto-merge (squash) for the created PR
      - name: Enable auto-merge
        if: ${{ steps.diff.outputs.changed == 'true' && steps.create-pr.outputs.pull-request-operation == 'created' }}
        run: gh pr merge --squash --auto "${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
