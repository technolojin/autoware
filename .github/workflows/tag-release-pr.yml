name: Tag Repository and Handle PR
on:
  pull_request:
    types:
      - closed
    branches:
      - beta/v4.3
jobs:
  tag-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-22.04
    steps:
      - name: Generate token
        id: generate-token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}
      - name: Configure Git
        run: "git config --global user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\ngit config --global user.name \"github-actions[bot]\""
      - name: Get PR information
        id: pr_info
        run: "echo \"pr_number=${{ github.event.pull_request.number }}\" >> $GITHUB_OUTPUT\necho \"merge_commit_sha=${{ github.event.pull_request.merge_commit_sha }}\" >> $GITHUB_OUTPUT"
      - name: Check if tag exists
        id: check_tag
        run: "TAG=\"v4.3.0\"\nif git rev-parse \"$TAG\" >/dev/null 2>&1; then\n  echo \"Tag $TAG already exists.\"\n  echo \"exists=true\" >> $GITHUB_OUTPUT\nelse\n  echo \"Tag $TAG does not exist.\"\n  echo \"exists=false\" >> $GITHUB_OUTPUT\nfi"
      - name: Create and push tag if not exists
        if: steps.check_tag.outputs.exists == 'false'
        run: "TAG=\"v4.3.0\"\ngit tag $TAG\ngit push origin $TAG"
