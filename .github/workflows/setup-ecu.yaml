name: setup-ecu

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

jobs:
  make-sure-label-is-present:
    uses: autowarefoundation/autoware-github-actions/.github/workflows/make-sure-label-is-present.yaml@v1
    with:
      label: tag:run-build-test

  check-changed-files:
    runs-on: ubuntu-22.04
    outputs:
      any-changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: step-security/changed-files@v45
        with:
          files: |
            ansible-galaxy-requirements.yaml
            ansible/**

  setup-ecu:
    needs: [make-sure-label-is-present, check-changed-files]
    if: ${{ needs.make-sure-label-is-present.outputs.result == 'true' }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        job:
          - awsim_pc
          - ecu_setup
          - x2_cert
          - x2_sub
          - x2_sub_cert
          - x2_logging
          - x2_perception_1
          - x2_perception_2
          - x2_addon
          - x2_addonlite
          - x2_media_streaming_1
          - x2_media_streaming_2
          - x2_signage
          - x2_voice_system
        include:
          - job: awsim_pc
            playbook: awsim_pc
            additional_args: -y -v -e vehicle_id=1234
          - job: ecu_setup
            playbook: ecu_setup
            additional_args: -y -v -e vehicle_id=1234
          - job: x2_cert
            playbook: ecu_setup
            additional_args: -y -v -e vehicle_id=1234 -e skip_xcarbon=true -e run_cert_setup=true
          - job: x2_sub
            playbook: x2_sub
            additional_args: -y -v -e vehicle_id=1234
          - job: x2_sub_cert
            playbook: x2_sub
            additional_args: -y -v -e vehicle_id=1234 -e run_cert_setup=true
          - job: x2_logging
            playbook: x2_logging
            additional_args: -y -v -e vehicle_id=1234 -e github_token=''
          - job: x2_perception_1
            playbook: x2_perception
            additional_args: -y -v -e ecu_id=perception1
          - job: x2_perception_2
            playbook: x2_perception
            additional_args: -y -v -e ecu_id=perception2
          - job: x2_addon
            playbook: x2_addon
            additional_args: -y -v -e github_token=''
          - job: x2_addonlite
            playbook: x2_addonlite
            additional_args: -y -v -e ecu_id=addonlite
          - job: x2_media_streaming_1
            playbook: x2_media_streaming
            additional_args: -y -v -e ecu_id=media-streaming1
          - job: x2_media_streaming_2
            playbook: x2_media_streaming
            additional_args: -y -v -e ecu_id=media-streaming2
          - job: x2_signage
            playbook: x2_signage
            additional_args: -y -v -e github_token=''
          - job: x2_voice_system
            playbook: x2_voice_system
            additional_args: -y -v
    steps:
      - name: Check out repository
        if: ${{ needs.check-changed-files.outputs.any-changed == 'true' }}
        uses: actions/checkout@v4

      - name: Generate token
        if: ${{ needs.check-changed-files.outputs.any-changed == 'true' }}
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      - name: Set git config
        if: ${{ needs.check-changed-files.outputs.any-changed == 'true' }}
        uses: autowarefoundation/autoware-github-actions/set-git-config@v1
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Run setup script
        if: ${{ needs.check-changed-files.outputs.any-changed == 'true' }}
        run: |
          ./setup-ecu.sh ${{ matrix.playbook }} ${{ matrix.additional_args }} -e reload_systemd=no -e skip_for_github_actions=true
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Skip ECU setup (no changes detected)
        if: ${{ needs.check-changed-files.outputs.any-changed != 'true' }}
        run: |
          echo "ansible-galaxy-requirements.yaml has not changed"
          echo "ECU setup skipped for this job"
          echo "Job completed successfully"
