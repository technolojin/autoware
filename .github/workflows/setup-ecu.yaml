name: setup-ecu

on:
  pull_request:

jobs:
  setup-ecu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        playbook:
          - ecu_setup
        include:
          - playbook: ecu_setup
            additional_args: -y -v -e vehicle_id=1234
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate token
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      - name: Set git config
        uses: autowarefoundation/autoware-github-actions/set-git-config@v1
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Run setup script
        run: |
          ./setup-ecu.sh ${{ matrix.playbook }} ${{ matrix.additional_args }} -e reload_systemd=no
