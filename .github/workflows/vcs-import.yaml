name: vcs-import

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make-sure-label-is-present:
    uses: autowarefoundation/autoware-github-actions/.github/workflows/make-sure-label-is-present.yaml@v1
    with:
      label: tag:run-build-test

  load-env:
    needs: make-sure-label-is-present
    if: ${{ needs.make-sure-label-is-present.outputs.result == 'true' }}
    uses: ./.github/workflows/load-env.yaml

  vcs-import:
    needs: load-env
    runs-on: ubuntu-22.04
    container: ros:${{ needs.load-env.outputs.rosdistro }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pip for rosdep
        run: |
          sudo apt-get -y update
          sudo apt-get -y install python3-pip

      - name: Register AutonomouStuff repository
        uses: autowarefoundation/autoware-github-actions/register-autonomoustuff-repository@v1
        with:
          rosdistro: ${{ needs.load-env.outputs.rosdistro }}

      - name: Generate token
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      - name: Set git config
        uses: autowarefoundation/autoware-github-actions/set-git-config@v1
        with:
          token: ${{ steps.generate-token.outputs.token }}

      # Temp: until sxpf and c2-readout-delay-setter is visible in CI environment
      - name: Set up yq
        uses: chrisdickinson/setup-yq@v1.0.1
        with:
          yq-version: v4.49.2

      - name: Run vcs import
        run: |
          mkdir src
          # import all repos (no filtering)
          ./repos-filter.sh autoware.repos main | vcs import src --shallow # temp: until sxpf and c2-readout-delay-setter is visible in CI environment
          # vcs import src --shallow < autoware.repos
          vcs import src --shallow < simulator.repos
          vcs import src --shallow < tools.repos

      - name: Run vcs export
        run: |
          vcs export --exact src || true

      - name: Run rosdep install
        run: |
          sudo apt-get -y update
          rosdep update
          DEBIAN_FRONTEND=noninteractive rosdep install -y --from-paths src --ignore-src --rosdistro ${{ needs.load-env.outputs.rosdistro }}
