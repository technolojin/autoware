name: update-project-version

on:
  push:
    branches:
      - beta/**

jobs:
  update-project-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate token
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      - name: Set git config
        uses: autowarefoundation/autoware-github-actions/set-git-config@v1
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Update project version
        working-directory: autoware_proj_version/resource
        run: |
          version=$(echo ${{ github.ref }} | sed -e "s/.*\/v//")
          cat version.json | jq .version=\"$version\" > version.json.temp
          mv version.json.temp version.json

      - name: Commit Update Project Version
        run: |
          if ! git diff --exit-code --quiet
          then
            git add .
            git commit -m "Update project version"
          fi

      - name: Get Branch name
        run: |
          echo "BRANCH_NAME=beta/$(basename ${{ github.ref }})" >> $GITHUB_ENV

      - name: Create PR
        id: create-pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "chore: update beta branch for ${{ env.BASE_BRANCH }}"
          committer: GitHub <noreply@github.com>
          author: GitHub <noreply@github.com>
          signoff: false
          base: ${{ env.BRANCH_NAME }}
          branch: tmp/${{ env.BRANCH_NAME }}
          delete-branch: true
          title: "chore: update project version"
          body: |
            update project branch
          labels: |
            bot
            update-project-branch
          draft: false

      - name: Check outputs
        run: |
          echo "Pull Request Number - ${{ steps.create-pr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.create-pr.outputs.pull-request-url }}"

      - name: Enable auto-merge
        if: ${{ steps.create-pr.outputs.pull-request-operation == 'created' }}
        run: gh pr merge --squash --auto "${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
