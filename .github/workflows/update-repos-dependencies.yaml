# For vanilla and ref.design repositories.
# Update .repos files and create/update a PR if there are changes.
# Additionally, for the main branch, update the unstable branch for daily tests.
name: Update Repos Dependencies

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Target branch name (e.g. 'main')
        required: true
        type: string
  workflow_call:
    inputs:
      branch:
        description: Target branch name
        required: true
        type: string

jobs:
  update-repos-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate token
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      - name: Set git config
        uses: autowarefoundation/autoware-github-actions/set-git-config@v1
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruamel.yaml

      - name: Update repos dependencies on target branch
        id: update-repos-dependencies
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          BRANCH_NAME: ${{ inputs.branch }}
        run: |
          PR_BRANCH_NAME="update-repos-dependencies-${BRANCH_NAME}"

          # Scripts should be copied to tmp directory before checkout.
          cp repos-fetch.py /tmp/repos-fetch.py
          cp .github/workflows/scripts/repos-diff.py /tmp/repos-diff.py

          git checkout "${BRANCH_NAME}"
          git checkout -B "${PR_BRANCH_NAME}"

          # Run the Python script to update repos and generate PR body
          for file in autoware.repos simulator.repos tools.repos awsim.repos ansible-galaxy-requirements.yaml; do
            if [ -f "$file" ]; then
              echo "Updating $file"
              python /tmp/repos-fetch.py "$file" --update
              git add "$file"
            fi
          done

          # Commit changes
          if git diff --cached --quiet; then
            echo "No dependency updates to commit"
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update repos dependencies on ${BRANCH_NAME}"
            git push origin "${PR_BRANCH_NAME}" --force
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi

          if [ "${BRANCH_NAME}" = "main" ]; then
            # non-PR branch for daily tests
            UNSTABLE_BRANCH_NAME="unstable"
            git checkout -B "${UNSTABLE_BRANCH_NAME}"
            git push origin "${UNSTABLE_BRANCH_NAME}" --force
          fi

          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "sync-branch=${PR_BRANCH_NAME}" >> $GITHUB_OUTPUT

          # Collect markdown diffs for all files
          DIFF_MD=""
          for file in autoware.repos simulator.repos tools.repos awsim.repos ansible-galaxy-requirements.yaml; do
            if [ -f "$file" ]; then
              DIFF_OUT=$(python /tmp/repos-diff.py "$file" HEAD~1 HEAD)
              DIFF_MD="${DIFF_MD}\n${DIFF_OUT}\n"
            fi
          done

          # Save to GITHUB_OUTPUT for use in PR body
          echo "diff-md<<EOF" >> $GITHUB_OUTPUT
          echo -e "$DIFF_MD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or Update Pull Request
        if: steps.update-repos-dependencies.outputs.has-changes == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          BRANCH_NAME: ${{ steps.update-repos-dependencies.outputs.branch }}
          PR_BRANCH_NAME: ${{ steps.update-repos-dependencies.outputs.sync-branch }}
          DIFF_MD: ${{ steps.update-repos-dependencies.outputs.diff-md }}
        run: |
          # Prepare PR body
          echo "## Changes" > pr-body.md
          echo "" >> pr-body.md
          echo "$DIFF_MD" >> pr-body.md
          cat <<EOF >> pr-body.md

          ## Notes for Reviewers
          This PR updates the repository dependencies in ${BRANCH_NAME}.

          - **Please review the changes before merging.**

          ## Workflow Information
          - **Run**: [${{ github.workflow }} #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          # Create or update PR using gh CLI
          # Labels `bot` and `tag:run-build-test` are assumed to exist.
          gh label create update-repos-dependencies || true

          # Try to create a new PR. If it already exists, update the existing one.
          if gh pr create \
            --base "${BRANCH_NAME}" \
            --head "${PR_BRANCH_NAME}" \
            --title "chore: update repos dependencies on ${BRANCH_NAME}" \
            --body-file pr-body.md \
            --label bot \
            --label update-repos-dependencies \
            --label tag:run-build-test
          then
            # Enable auto-merge
            gh pr merge --squash --auto "${PR_BRANCH_NAME}"
          else
            gh pr edit "${PR_BRANCH_NAME}" \
              --title "chore: update repos dependencies on ${BRANCH_NAME}" \
              --body-file pr-body.md \
              --add-label bot \
              --add-label update-repos-dependencies \
              --add-label tag:run-build-test
          fi
