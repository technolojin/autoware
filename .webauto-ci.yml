# This is required for Continuous Integration for Autoware using the simulator
# and remote update (Over The Air update) to real cars.
# If you have any additional questions, please contact us at #tier4-dev channel.

version: 2

artifacts:
  - name: main
    build:
      type: tier4/universe/main/amd64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2.yaml
      ml_packages:
        - name: centerpoint
          release: x2/mlmodel/v0.1.0
  - name: object-recognition
    build:
      type: tier4/general/rqx-58g/arm64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-perception.yaml
        APP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-perception-application.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no -e perception_type=od -e vehicle_model=j6 -e use_oem_setup=yes
  - name: traffic-light-recognition
    build:
      type: tier4/general/rqx-58g/arm64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-perception.yaml
        APP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-perception-application.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no -e perception_type=tlr -e vehicle_model=j6 -e use_oem_setup=yes
  - name: mot
    build:
      type: tier4/general/ubuntu/jammy/amd64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-mot.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no
  - name: sub
    build:
      type: tier4/universe/main/amd64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-sub.yaml
  - name: signage
    build:
      type: tier4/x2/raspi/arm64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-signage.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no
  - name: voice-system
    build:
      type: tier4/x2/raspi/arm64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-voice-system.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no
  - name: media-streaming
    build:
      type: tier4/x2/rqx-58g/arm64/v2
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-media-streaming.yaml
        APP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-media-streaming-container.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no

simulations:
  - name: planning_sim_v2
    type: planning_sim_v2
    scenario_parameter_group: common # Necessary to define the name for each vehicle type
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium
      parameters:
        vehicle_model: j6_gen1
        sensor_model: aip_x2
        autoware_launch_package: autoware_launch
        autoware_launch_file: planning_simulator.launch.xml
        architecture_type: awf/universe
        initialize_duration: "90"

  - name: obstacle_detection
    type: obstacle_detection
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: ndt_convergence
    type: ndt_convergence
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/large

  - name: localization
    type: localization
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/large

  - name: obstacle_segmentation
    type: obstacle_segmentation
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: performance_diag
    type: performance_diag
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: perception
    type: perception
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      pre_tasks:
        - exec: source /home/autoware/autoware.proj/install/setup.bash && ros2 launch lidar_centerpoint lidar_centerpoint.launch.xml model_name:=aip_x2 model_path:=/opt/autoware/mlmodels/centerpoint model_param_path:=/opt/autoware/mlmodels/centerpoint/aip_x2.param.yaml build_only:=true
          mounts:
            - volume: model
      volumes:
        - name: model
          path: /opt/autoware/autoware/mlmodels/centerpoint
          preserve_original_files: true

release:
  components:
    - name: autoware
      deployment:
        type: rootfs
        artifact: main
      alternative_deployments:
        - type: installer
          artifact: main
    - name: perception1
      deployment:
        type: rootfs
        artifact: object-recognition
    - name: perception2
      deployment:
        type: rootfs
        artifact: object-recognition
    - name: perception3
      deployment:
        type: rootfs
        artifact: object-recognition
    - name: perception4
      deployment:
        type: rootfs
        artifact: traffic-light-recognition
    - name: mot
      deployment:
        type: rootfs
        artifact: mot
      alternative_deployments:
        - type: installer
          artifact: mot
    - name: sub
      deployment:
        type: rootfs
        artifact: sub
      alternative_deployments:
        - type: installer
          artifact: sub
    - name: signage
      deployment:
        type: rootfs
        artifact: signage
    - name: voice-system
      deployment:
        type: rootfs
        artifact: voice-system
    - name: media-streaming
      deployment:
        type: rootfs
        artifact: media-streaming

scenario_parameter_groups:
  # Necessary to update the parameters for each vehicle type
  - name: common
    parameters:
      __ego_center_x__: 1.345
      __ego_center_y__: 0
      __ego_center_z__: 1.25
      __ego_dimensions_width__: 1.896
      __ego_dimensions_length__: 4.89
      __ego_dimensions_height__: 2.5
      wheel_radius: 0.383
      wheel_width: 0.235
      wheel_base: 2.79 # between front wheel center and rear wheel center
      wheel_tread: 1.64 # between left wheel center and right wheel center
      front_overhang: 1.0 # between front wheel center and vehicle front
      rear_overhang: 1.1 # between rear wheel center and vehicle rear
      left_overhang: 0.128 # between left wheel center and vehicle left
      right_overhang: 0.128 # between right wheel center and vehicle right
      max_steer_angle: 0.70 # [rad]
      obstacle_stop_line_distance: 5.0
      crosswalk_stop_line_distance: 3.5
      walkway_stop_line_distance: 3.5
      intersection_stop_line_distance: 3.0
      traffic_light_stop_line_distance: 0.0
