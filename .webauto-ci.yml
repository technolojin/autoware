simulations:
  - name: planning_sim_v2
    type: planning_sim_v2
    scenario_parameter_group: common # Necessary to define the name for each vehicle type
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium
      parameters:
        vehicle_model: j6_gen1
        sensor_model: aip_x2
        autoware_launch_package: autoware_launch
        autoware_launch_file: planning_simulator.launch.xml
        architecture_type: awf/universe/20230906
        initialize_duration: "90"

  - name: obstacle_detection
    type: obstacle_detection
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: ndt_convergence
    type: ndt_convergence
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/large

  - name: localization
    type: localization
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/large

  - name: obstacle_segmentation
    type: obstacle_segmentation
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: performance_diag
    type: performance_diag
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: perception
    type: perception
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      pre_tasks:
        - exec: source /home/autoware/autoware.proj/install/setup.bash && ros2 launch lidar_centerpoint lidar_centerpoint.launch.xml model_name:=aip_x2 model_path:=/opt/autoware/mlmodels/centerpoint model_param_path:=/opt/autoware/mlmodels/centerpoint/aip_x2.param.yaml build_only:=true
          mounts:
            - volume: model
      volumes:
        - name: model
          path: /opt/autoware/mlmodels/centerpoint
          preserve_original_files: true

  - name: yabloc
    type: yabloc
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: eagleye
    type: eagleye
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

release:
  components:
    - name: autoware
      deployment:
        type: rootfs
        artifact: main
      alternative_deployments:
        - type: installer
          artifact: main
    - name: perception1
      deployment:
        type: rootfs
        artifact: object-recognition
    - name: perception2
      deployment:
        type: rootfs
        artifact: object-recognition
    - name: perception3
      deployment:
        type: rootfs
        artifact: object-recognition
    - name: perception4
      deployment:
        type: rootfs
        artifact: traffic-light-recognition
    - name: mot
      deployment:
        type: rootfs
        artifact: mot
      alternative_deployments:
        - type: installer
          artifact: mot
    - name: sub
      deployment:
        type: rootfs
        artifact: sub
      alternative_deployments:
        - type: installer
          artifact: sub
    - name: signage
      deployment:
        type: rootfs
        artifact: signage
    - name: voice-system
      deployment:
        type: rootfs
        artifact: voice-system
    - name: media-streaming
      deployment:
        type: rootfs
        artifact: media-streaming

scenario_parameter_groups:
  # Necessary to update the parameters for each vehicle type
  - name: common
    parameters:
      __ego_center_x__: 2.08875 # ego_dimensions_length / 2.0 - rear_overhang
      __ego_center_y__: 0
      __ego_center_z__: 1.54 # ego_dimensions_height / 2.0
      __ego_dimensions_width__: 2.3 # wheel_tread + left_overhang + right_overhang
      __ego_dimensions_length__: 7.1734 # wheel_base + front_overhang + rear_overhang
      __ego_dimensions_height__: 3.06
      wheel_radius: 0.3725
      wheel_width: 0.215
      wheel_base: 4.76 # between front wheel center and rear wheel center
      wheel_tread: 1.754 # front:1.754 rear:1.564 between left wheel center and right wheel center
      front_overhang: 0.9154 # between front wheel center and vehicle front
      rear_overhang: 1.498 # between rear wheel center and vehicle rear
      left_overhang: 0.273 # 1.150-2.08/2 between left wheel center and vehicle left
      right_overhang: 0.273 # between right wheel center and vehicle right
      max_steer_angle: 0.646 # [rad]
      stop_line_distance: 0.0 # param name in autoware_launch: stop_margin
      blind_spot_stop_line_distance: 1.0 # param name in autoware_launch: stop_line_margin
      obstacle_stop_line_distance: 6.0
      crosswalk_stop_line_distance: 3.5
      walkway_stop_line_distance: 0.0
      intersection_stop_line_distance: 3.0
      traffic_light_stop_line_distance: 0.0
