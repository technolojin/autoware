simulations:
  - name: planning_sim_v2
    type: planning_sim_v2
    scenario_parameter_group: common # Necessary to define the name for each vehicle type
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium
      parameters:
        vehicle_model: j6_gen2
        sensor_model: aip_x2_gen2
        autoware_launch_package: autoware_launch
        autoware_launch_file: planning_simulator.launch.xml
        architecture_type: awf/universe/20250130
        initialize_duration: "90"

  - name: obstacle_detection
    type: obstacle_detection
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: ndt_convergence
    type: ndt_convergence
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/large

  - name: localization
    type: localization
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/large
      parameters:
        play_rate: "0.125"

  - name: obstacle_segmentation
    type: obstacle_segmentation
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: performance_diag
    type: performance_diag
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium
      parameters:
        play_rate: "0.125"
        localization: "false"

  - name: planning_control
    type: planning_control
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        use_traffic_light_recognition: "false"
        play_rate: "0.125"
      pre_tasks:
        - exec: source /home/autoware/autoware.proj/install/setup.bash && ros2 launch autoware_lidar_centerpoint lidar_centerpoint.launch.xml model_name:=centerpoint_x2 model_path:=/opt/autoware/mlmodels/centerpoint model_param_path:=$(ros2 pkg prefix autoware_launch --share)/config/perception/object_recognition/detection/lidar_model/centerpoint_x2.param.yaml build_only:=true
          mounts:
            - volume: model
      volumes:
        - name: model
          path: /opt/autoware/mlmodels/centerpoint
          preserve_original_files: true

  - name: annotationless_perception
    type: annotationless_perception
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        use_traffic_light_recognition: "false"
      pre_tasks:
        - exec: source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_lidar_centerpoint lidar_centerpoint.launch.xml model_name:=centerpoint_tiny model_path:=/home/autoware/autoware_data/lidar_centerpoint model_param_path:=$(ros2 pkg prefix autoware_lidar_centerpoint --share)/config/centerpoint_tiny.param.yaml build_only:=true
          mounts:
            - volume: model
      volumes:
        - name: model
          path: /home/autoware/autoware_data/lidar_centerpoint
          preserve_original_files: true

  - name: PerformanceTest_perception
    type: perception
    suite:
      selector:
        match_labels:
          perception_test_type: performance
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        sensing: "false"
        use_traffic_light_recognition: "false"
      pre_tasks:
        - exec: source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_lidar_centerpoint lidar_centerpoint.launch.xml model_name:=centerpoint_tiny model_path:=/home/autoware/autoware_data/lidar_centerpoint model_param_path:=$(ros2 pkg prefix autoware_lidar_centerpoint --share)/config/centerpoint_tiny.param.yaml build_only:=true
          mounts:
            - volume: model
      volumes:
        - name: model
          path: /home/autoware/autoware_data/lidar_centerpoint
          preserve_original_files: true

  - name: PerformanceTest_traffic_light
    type: traffic_light
    suite:
      selector:
        match_labels:
          perception_test_type: performance
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        use_empty_dynamic_object_publisher: "true"
      pre_tasks:
        - exec: source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_traffic_light_fine_detector traffic_light_fine_detector.launch.xml traffic_light_fine_detector_model_path:=$HOME/autoware_data/traffic_light_fine_detector traffic_light_fine_detector_label_name:=tlr_labels.txt traffic_light_fine_detector_model_name:=tlr_car_ped_yolox_s_batch_6 build_only:=true
          mounts:
            - volume: model_fine_detector
        - exec: TLC=traffic_light_classifier && source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_${TLC} ${TLC}.launch.xml ${TLC}_param_path:=$(ros2 pkg prefix autoware_${TLC} --share)/config/car_${TLC}.param.yaml ${TLC}_model_path:=$HOME/autoware_data/${TLC}  car_${TLC}_label_name:=lamp_labels.txt car_${TLC}_model_name:=${TLC}_mobilenetv2_batch_6 build_only:=true
          mounts:
            - volume: model_classifier
        - exec: TLC=traffic_light_classifier && source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_${TLC} ${TLC}.launch.xml ${TLC}_param_path:=$(ros2 pkg prefix autoware_${TLC} --share)/config/pedestrian_${TLC}.param.yaml ${TLC}_model_path:=$HOME/autoware_data/${TLC} pedestrian_${TLC}_label_name:=lamp_labels_ped.txt pedestrian_${TLC}_model_name:=ped_${TLC}_mobilenetv2_batch_4  build_only:=true
          mounts:
            - volume: model_classifier
      volumes:
        - name: model_fine_detector
          path: /home/autoware/autoware_data/traffic_light_fine_detector
          preserve_original_files: true
        - name: model_classifier
          path: /home/autoware/autoware_data/traffic_light_classifier
          preserve_original_files: true

