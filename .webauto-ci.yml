simulations:
  - name: planning_sim_v2_j6_gen2
    type: planning_sim_v2
    scenario_parameter_group: j6_gen2 # Necessary to define the name for each vehicle type
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium
      parameters:
        vehicle_model: j6_gen2
        sensor_model: aip_x2_gen2
        autoware_launch_package: autoware_launch
        autoware_launch_file: planning_simulator.launch.xml
        architecture_type: awf/universe/20250130
        initialize_duration: "90"
        consider_acceleration_by_road_slope: "true"
        record_storage_id: mcap
        autoware.output_metrics: "true"
        autoware.diagnostic_config: ./simulation/config/ssv2_adaptor_diagnostic_config.yaml
      logging:
        additional_log_archive:
          paths:
            - /home/autoware/.ros/log/autoware_metrics

  # - name: planning_sim_v2_epalette
  #   type: planning_sim_v2
  #   scenario_parameter_group: epalette # Necessary to define the name for each vehicle type
  #   simulator:
  #     deployment:
  #       type: container
  #       artifact: main
  #     runtime:
  #       type: standard1/amd64/medium
  #     parameters:
  #       vehicle_model: epalette
  #       sensor_model: aip_x2_gen2
  #       autoware_launch_package: autoware_launch
  #       autoware_launch_file: planning_simulator.launch.xml
  #       architecture_type: awf/universe/20250130
  #       initialize_duration: "90"
  #       consider_acceleration_by_road_slope: "true"
  #       record_storage_id: mcap
  #       autoware.output_metrics: "true"
  #     logging:
  #       additional_log_archive:
  #         paths:
  #           - /home/autoware/.ros/log/autoware_metrics

  - name: obstacle_detection
    type: obstacle_detection
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: ndt_convergence
    type: ndt_convergence
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/large

  - name: localization_with_gpu_sensing
    type: localization
    suite:
      selector:
        match_labels:
          use_gpu: "true"
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        play_rate: "0.125"

  - name: localization_without_gpu_sensing
    type: localization
    suite:
      selector:
        match_labels:
          use_gpu: "false"
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/xlarge
      parameters:
        play_rate: "0.125"

  - name: obstacle_segmentation
    type: obstacle_segmentation
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        use_traffic_light_recognition: "false"
        lidar_detection_model: clustering

  - name: performance_diag
    type: performance_diag
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        play_rate: "0.125"
        localization: "false"

  - name: traffic_light_fine_detector
    type: traffic_light
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        remap_arg: /sensing/lidar/concatenated/pointcloud
        use_empty_dynamic_object_publisher: "true"
        play_delay: "150"
        traffic_light_recognition/fusion_only: "false"
      pre_tasks:
        - exec: TLF=traffic_light_fine_detector && source $HOME/pilot-auto/install/setup.bash && ros2 launch autoware_${TLF} ${TLF}.launch.xml model_path:=$HOME/autoware_data/${TLF}/tlr_car_ped_yolox_s_batch_6.onnx label_name:=$HOME/autoware_data/${TLF}/tlr_labels.txt  build_only:=true
          mounts:
            - volume: model_fine_detector
        - exec: TLC=traffic_light_classifier && source $HOME/pilot-auto/install/setup.bash && ros2 launch autoware_${TLC} car_${TLC}.launch.xml model_path:=$HOME/autoware_data/${TLC}/${TLC}_mobilenetv2_batch_6.onnx label_path:=$HOME/autoware_data/${TLC}/lamp_labels.txt build_only:=true
          mounts:
            - volume: model_classifier
        - exec: TLC=traffic_light_classifier && source $HOME/pilot-auto/install/setup.bash && ros2 launch autoware_${TLC} pedestrian_${TLC}.launch.xml model_path:=$HOME/autoware_data/${TLC}/ped_${TLC}_mobilenetv2_batch_6.onnx label_name:=$HOME/autoware_data/${TLC}/lamp_labels_ped.txt build_only:=true
          mounts:
            - volume: model_classifier
      volumes:
        - name: model_fine_detector
          path: /home/autoware/autoware_data/traffic_light_fine_detector
          preserve_original_files: true
        - name: model_classifier
          path: /home/autoware/autoware_data/traffic_light_classifier
          preserve_original_files: true

  - name: traffic_light_whole_image_detection
    type: traffic_light
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        remap_arg: /sensing/lidar/concatenated/pointcloud
        use_empty_dynamic_object_publisher: "true"
        play_delay: "150"
        traffic_light_recognition/fusion_only: "false"
        traffic_light_recognition/high_accuracy_detection_type: whole_image_detection
      pre_tasks:
        - exec: source $HOME/pilot-auto/install/setup.bash && ros2 launch autoware_tensorrt_yolox yolox_traffic_light_detector.launch.xml model_path:=$HOME/autoware_data/tensorrt_yolox/yolox_s_car_ped_tl_detector_960_960_batch_1.onnx label_path:=$HOME/autoware_data/tensorrt_yolox/car_ped_tl_detector_labels.txt yolox_param_path:=$(ros2 pkg prefix autoware_tensorrt_yolox --share)/config/yolox_traffic_light_detector.param.yaml use_decompress:=false build_only:=true
          mounts:
            - volume: model_tensorrt_yolox
        - exec: TLC=traffic_light_classifier && source $HOME/pilot-auto/install/setup.bash && ros2 launch autoware_${TLC} car_${TLC}.launch.xml model_path:=$HOME/autoware_data/${TLC}/${TLC}_mobilenetv2_batch_6.onnx label_path:=$HOME/autoware_data/${TLC}/lamp_labels.txt build_only:=true
          mounts:
            - volume: model_classifier
        - exec: TLC=traffic_light_classifier && source $HOME/pilot-auto/install/setup.bash && ros2 launch autoware_${TLC} pedestrian_${TLC}.launch.xml model_path:=$HOME/autoware_data/${TLC}/ped_${TLC}_mobilenetv2_batch_6.onnx label_name:=$HOME/autoware_data/${TLC}/lamp_labels_ped.txt build_only:=true
          mounts:
            - volume: model_classifier
      volumes:
        - name: model_tensorrt_yolox
          path: /home/autoware/autoware_data/tensorrt_yolox
          preserve_original_files: true
        - name: model_classifier
          path: /home/autoware/autoware_data/traffic_light_classifier
          preserve_original_files: true

  - name: planning_control
    type: planning_control
    suite:
      selector:
        match_labels:
          pc_dlr_type: dlr_aeb
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        use_traffic_light_recognition: "false"
        play_rate: "0.125"
        vehicle_model: j6_gen2
        sensor_model: aip_x2_gen2
      pre_tasks:
        - exec: rm -f /opt/autoware/mlmodels/centerpoint/*engine && rm -f /opt/autoware/mlmodels/centerpoint/*json && source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_lidar_centerpoint lidar_centerpoint.launch.xml model_name:=centerpoint model_path:=/opt/autoware/mlmodels/centerpoint model_param_path:=$(ros2 pkg prefix autoware_launch --share)/config/perception/object_recognition/detection/lidar_model/centerpoint.param.yaml build_only:=true
          mounts:
            - volume: model
      volumes:
        - name: model
          path: /opt/autoware/mlmodels/centerpoint
          preserve_original_files: true

  - name: annotationless_perception
    type: annotationless_perception
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        use_traffic_light_recognition: "false"
      pre_tasks:
        - exec: source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_lidar_centerpoint lidar_centerpoint.launch.xml model_name:=centerpoint_tiny model_path:=/home/autoware/autoware_data/lidar_centerpoint model_param_path:=$(ros2 pkg prefix autoware_lidar_centerpoint --share)/config/centerpoint_tiny.param.yaml build_only:=true
          mounts:
            - volume: model
      volumes:
        - name: model
          path: /home/autoware/autoware_data/lidar_centerpoint
          preserve_original_files: true

  - name: perception
    type: perception
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      pre_tasks:
        - exec: rm -f /opt/autoware/mlmodels/centerpoint/*engine && rm -f /opt/autoware/mlmodels/centerpoint/*json && source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_lidar_centerpoint lidar_centerpoint.launch.xml model_name:=centerpoint model_path:=/opt/autoware/mlmodels/centerpoint model_param_path:=$(ros2 pkg prefix autoware_launch --share)/config/perception/object_recognition/detection/lidar_model/centerpoint.param.yaml build_only:=true
          mounts:
            - volume: model
        - exec: source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_tensorrt_yolox yolox_s_plus_opt.launch.xml model_path:=/opt/autoware/mlmodels/yolox/yolox-sPlus-T4-960x960-debris.onnx label_path:=/opt/autoware/mlmodels/yolox/label.txt color_map_path:=/opt/autoware/mlmodels/yolox/semseg_color_map.csv yolox_param_path:=$(ros2 pkg prefix autoware_tensorrt_yolox --share)/config/yolox_s_plus_opt.param.yaml use_decompress:=false build_only:=true
          mounts:
            - volume: model_yolox
      parameters:
        use_traffic_light_recognition: "false"
        evaluation_detection_topic_regex: None
        evaluation_prediction_topic_regex: None
        play_rate: "0.1"
        play_delay: "50"
        remap_profile: x2_perception_all
        with_2d_detector: "true"
        yolox_model_path: /opt/autoware/mlmodels/yolox/yolox-sPlus-T4-960x960-debris.onnx
        yolox_label_path: /opt/autoware/mlmodels/yolox/label.txt
        yolox_color_map_path: /opt/autoware/mlmodels/yolox/semseg_color_map.csv
        yolox_param_file: yolox_s_plus_opt.param.yaml
        use_bytetrack: "true"
        camera_ids: 0,1,2,3,4,5

        publish_topic_from_rosbag: /sensing/camera/camera0/camera_info,/sensing/camera/camera1/camera_info,/sensing/camera/camera2/camera_info,/sensing/camera/camera3/camera_info,/sensing/camera/camera4/camera_info,/sensing/camera/camera5/camera_info,/sensing/camera/camera6/camera_info,/sensing/camera/camera7/camera_info,/sensing/camera/camera8/camera_info,/sensing/camera/camera9/camera_info,/sensing/camera/camera10/camera_info
      volumes:
        - name: model
          path: /opt/autoware/mlmodels/centerpoint
          preserve_original_files: true
        - name: model_yolox
          path: /opt/autoware/mlmodels/yolox
          preserve_original_files: true

  - name: yabloc
    type: yabloc
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: eagleye
    type: eagleye
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: ar_tag_based_localizer
    type: ar_tag_based_localizer
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium

  - name: all_components
    type: all_components
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        use_traffic_light_recognition: "false"
      pre_tasks:
        - exec: source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_lidar_centerpoint lidar_centerpoint.launch.xml model_name:=centerpoint_tiny model_path:=/home/autoware/autoware_data/lidar_centerpoint model_param_path:=$(ros2 pkg prefix autoware_lidar_centerpoint --share)/config/centerpoint_tiny.param.yaml build_only:=true
          mounts:
            - volume: model
      volumes:
        - name: model
          path: /home/autoware/autoware_data/lidar_centerpoint
          preserve_original_files: true

  - name: dlr_control_validator
    type: diagnostics
    suite:
      selector:
        match_labels:
          pc_dlr_type: dlr_control_validator
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium
      parameters:
        sensing: "false"
        perception: "false"
        localization: "false"
        planning: "false"
        control_module_preset: dlr_control_validator
        vehicle_model: j6_gen2
        sensor_model: aip_x2_gen2
        override_topics_regex: '"^/(?!localization/[^ ]*/pointcloud$)(?!perception/object_recognition/detection/(?!objects$)).*"'

  - name: dlr_pc_w_loc_track_pred
    type: planning_control
    suite:
      selector:
        match_labels:
          pc_dlr_type: dlr_pc_w_loc_track_pred
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: gpu1/amd64/large
      parameters:
        use_traffic_light_recognition: "false"
        pose_source: ndt
        sensing: "false"
        perception: "true"
        localization: "true"
        play_delay: "20.0"
        output_metrics: "true"
        vehicle_model: j6_gen2
        sensor_model: aip_x2_gen2
      logging:
        additional_log_archive:
          paths:
            - /home/autoware/.ros/log/autoware_metrics
        override_topics_regex: '"^/(?!localization/[^ ]*/pointcloud$)(?!perception/object_recognition/detection/(?!objects$)).*"'
      pre_tasks:
        - exec: source /home/autoware/pilot-auto/install/setup.bash && ros2 launch autoware_lidar_centerpoint lidar_centerpoint.launch.xml model_name:=centerpoint_tiny model_path:=/home/autoware/autoware_data/lidar_centerpoint model_param_path:=$(ros2 pkg prefix autoware_lidar_centerpoint --share)/config/centerpoint_tiny.param.yaml build_only:=true
          mounts:
            - volume: model
      volumes:
        - name: model
          path: /home/autoware/autoware_data/lidar_centerpoint
          preserve_original_files: true

  - name: dlr_pc_only
    type: planning_control
    suite:
      selector:
        match_labels:
          pc_dlr_type: dlr_pc_only
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium
      parameters:
        sensing: "false"
        perception: "false"
        localization: "false"
        output_metrics: "true"
        vehicle_model: j6_gen2
        sensor_model: aip_x2_gen2
      logging:
        additional_log_archive:
          paths:
            - /home/autoware/.ros/log/autoware_metrics
        override_topics_regex: '"^/(?!localization/[^ ]*/pointcloud$)(?!perception/object_recognition/detection/(?!objects$)).*"'

  - name: off_behavior_path_planner
    type: planning_control
    suite:
      selector:
        match_labels:
          pc_dlr_type: off_behavior_path_planner
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: standard1/amd64/medium
      parameters:
        sensing: "false"
        perception: "false"
        localization: "false"
        output_metrics: "true"
        vehicle_model: j6_gen2
        sensor_model: aip_x2_gen2
        behavior_path_planner_type: none
      logging:
        additional_log_archive:
          paths:
            - /home/autoware/.ros/log/autoware_metrics

release:
  name_template: ${datetime}-${version}
  components:
    - name: autoware
      deployment:
        type: ota_image
        artifact: main
      alternative_deployments:
        - type: installer
          artifact: main
        - type: container
          artifact: main
    - name: sub
      deployment:
        type: ota_image
        artifact: sub
      alternative_deployments:
        - type: installer
          artifact: sub
    - name: logging
      deployment:
        type: ota_image
        artifact: logging
      alternative_deployments:
