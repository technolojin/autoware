release:
  name_template: ${datetime}-${version}
  components:
    - name: autoware
      deployment:
        type: rootfs
        artifact: main
      alternative_deployments:
        - type: installer
          artifact: main
    - name: sub
      deployment:
        type: rootfs
        artifact: sub
      alternative_deployments:
        - type: installer
          artifact: sub
    - name: logging
      deployment:
        type: rootfs
        artifact: logging
      alternative_deployments:
        - type: installer
          artifact: logging
    - name: perception1
      deployment:
        type: rootfs
        artifact: perception1
      alternative_deployments:
        - type: installer
          artifact: perception1
    - name: perception2
      deployment:
        type: rootfs
        artifact: perception2
      alternative_deployments:
        - type: installer
          artifact: perception2
    - name: addon
      deployment:
        type: rootfs
        artifact: addon
      alternative_deployments:
        - type: installer
          artifact: addon
    - name: addonlite
      deployment:
        type: rootfs
        artifact: addonlite
      alternative_deployments:
        - type: installer
          artifact: addonlite
    - name: media-streaming1
      deployment:
        type: rootfs
        artifact: media-streaming1
      alternative_deployments:
        - type: installer
          artifact: media-streaming1
    - name: media-streaming2
      deployment:
        type: rootfs
        artifact: media-streaming2
      alternative_deployments:
        - type: installer
          artifact: media-streaming2
    - name: signage
      deployment:
        type: rootfs
        artifact: signage
      alternative_deployments:
        - type: installer
          artifact: signage
    - name: voice-system
      deployment:
        type: rootfs
        artifact: voice-system
      alternative_deployments:
        - type: installer
          artifact: voice-system

scenario_parameter_groups:
  # Necessary to update the parameters for each vehicle type
  - name: common
    parameters:
      __ego_center_x__: 2.0927 # ego_dimensions_length / 2.0 - rear_overhang
      __ego_center_y__: 0
      __ego_center_z__: 1.54 # ego_dimensions_height / 2.0
      __ego_dimensions_width__: 2.2916 # wheel_tread + left_overhang + right_overhang
      __ego_dimensions_length__: 7.2369 # wheel_base + front_overhang + rear_overhang
      __ego_dimensions_height__: 3.080
      wheel_radius: 0.3725
      wheel_width: 0.215
      wheel_base: 4.76012 # between front wheel center and rear wheel center
      wheel_tread: 1.754 # front:1.754 rear:1.564 between left wheel center and right wheel center
      front_overhang: 0.95099 # between front wheel center and vehicle front
      rear_overhang: 1.52579 # between rear wheel center and vehicle rear
      left_overhang: 0.26878 # between left wheel center and vehicle left
      right_overhang: 0.26878 # between right wheel center and vehicle right
      max_steer_angle: 0.646 # [rad]
      stop_line_distance: 0.5 # param name in autoware_launch: stop_margin
      blind_spot_stop_line_distance: 1.0 # param name in autoware_launch: stop_line_margin
      obstacle_stop_line_distance: 5.0 # param name in autoware_launch: stop_margin (obstacle_stop.param.yaml)
      crosswalk_stop_line_distance: 3.5 # param name in autoware_launch: stop_distance_from_crosswalk
      walkway_stop_line_distance: 1.5 # param name in autoware_launch: stop_distance_from_crosswalk
      intersection_stop_line_distance: 3.0 # param name in autoware_launch: stop_line_margin
      traffic_light_stop_line_distance: 0.5 # param name in autoware_launch: stop_margin
      run_out_stop_line_distance: 2.5 # param name in autoware_launch: stop_margin
