# This is required for Continuous Integration for Autoware using the simulator
# and remote update (Over The Air update) to real cars.
# If you have any additional questions, please contact us at #tier4-dev channel.

version: 2

artifacts:
  - name: main
    build:
      type: tier4/universe/main/amd64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2.yaml
      ml_packages:
        - name: centerpoint
          release: x2/mlmodel/v0.1.0
  - name: object-recognition
    build:
      type: tier4/general/rqx-58g/arm64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-perception.yaml
        APP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-perception-application.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no -e perception_type=od -e vehicle_model=j6 -e use_oem_setup=yes
  - name: traffic-light-recognition
    build:
      type: tier4/general/rqx-58g/arm64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-perception.yaml
        APP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-perception-application.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no -e perception_type=tlr -e vehicle_model=j6 -e use_oem_setup=yes
  - name: mot
    build:
      type: tier4/general/ubuntu/jammy/amd64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-mot.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no
  - name: sub
    build:
      type: tier4/universe/main/amd64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-sub.yaml
  - name: signage
    build:
      type: tier4/x2/raspi/arm64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-signage.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no
  - name: voice-system
    build:
      type: tier4/x2/raspi/arm64/v1
      environment_variables:
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: src/ecu_system_setup/x2-voice-system.yaml
        ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK_ARGS: -e reload_systemd=no

simulations:
  - name: planning_sim_v2
    type: planning_sim_v2
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: simulator/standard1/amd64/medium
        cpu: 8
        memory: 16384
      parameters:
        vehicle_model: j6_gen1
        sensor_model: aip_x2
        autoware_launch_package: autoware_launch
        autoware_launch_file: planning_simulator.launch.xml
        architecture_type: awf/universe
        initialize_duration: "90"

  - name: obstacle_detection
    type: obstacle_detection
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: simulator/standard1/amd64/medium
        cpu: 8
        memory: 16384

  - name: ndt_convergence
    type: ndt_convergence
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: simulator/standard1/amd64/medium
        cpu: 8
        memory: 16384

  - name: localization
    type: localization
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: simulator/standard1/amd64/medium
        cpu: 8
        memory: 16384

  - name: obstacle_segmentation
    type: obstacle_segmentation
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: simulator/standard1/amd64/medium
        cpu: 8
        memory: 16384

  - name: performance_diag
    type: performance_diag
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: simulator/standard1/amd64/medium
        cpu: 8
        memory: 16384

  - name: perception
    type: perception
    simulator:
      deployment:
        type: container
        artifact: main
      runtime:
        type: simulator/standard1/amd64/medium
        cpu: 8
        memory: 16384

release:
  components:
    - name: autoware
      deployment:
        type: rootfs
        artifact: main
      alternative_deployments:
        - type: installer
          artifact: main
    - name: perception1
      deployment:
        type: rootfs
        artifact: object-recognition
    - name: perception2
      deployment:
        type: rootfs
        artifact: object-recognition
    - name: perception3
      deployment:
        type: rootfs
        artifact: object-recognition
    - name: perception4
      deployment:
        type: rootfs
        artifact: traffic-light-recognition
    - name: mot
      deployment:
        type: rootfs
        artifact: mot
      alternative_deployments:
        - type: installer
          artifact: mot
    - name: sub
      deployment:
        type: rootfs
        artifact: sub
      alternative_deployments:
        - type: installer
          artifact: sub
    - name: signage
      deployment:
        type: rootfs
        artifact: signage
    - name: voice-system
      deployment:
        type: rootfs
        artifact: voice-system
