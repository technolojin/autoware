# This is required for Continuous Integration for Autoware using the simulator
# and remote update (Over The Air update) to real cars.
# If you have any additional questions, please contact us at #tier4-dev channel.

# cSpell: ignore annotationless buildspecs

version: 2

artifacts:
  - name: main
    metadata:
      play-ondemand.ci.web.auto/buildspec: Autoware-Humble_v0.29.0
    build:
      type: custom
      runtime:
        type: standard1/amd64/xlarge
      environment_variables:
        AUTOWARE_PATH: /home/autoware/pilot-auto
        ML_MODELS_PATH: /opt/autoware/mlmodels
        DEBIAN_FRONTEND: noninteractive
        LANG: C.UTF-8
        ENABLE_AGNOCAST: "1"
      developer_options:
        - name: webauto:ci:caret_enabled
          environment_variables:
            WEBAUTO_CI_BUILD_OPTION_CARET_ENABLED: ENABLED
      linux_parameters:
        kernel_version: 5.19.0-50-generic
      phases:
        - name: environment-setup
          user: root
          exec: ./.webauto-ci/main/environment-setup/run.sh
          caches:
            - name: apt-lists
              mountpoint: /var/lib/apt/lists
            - name: apt-archives
              mountpoint: /var/cache/apt/archives
          build_result_reuse:
            key_files:
              - .webauto-ci.yml
              - .webauto-ci/main/environment-setup/**/*
        - name: autoware-setup
          user: autoware
          workdir: /home/autoware/pilot-auto
          exec: ./.webauto-ci/main/autoware-setup/run.sh
          caches:
            - name: apt-lists
              mountpoint: /var/lib/apt/lists
            - name: apt-archives
              mountpoint: /var/cache/apt/archives
          build_result_reuse:
            key_files:
              - .webauto-ci.yml
              - .webauto-ci/main/autoware-setup/**/*
              - ansible/**/*
              - ansible-galaxy-requirements.yaml
              - amd64.env
          incremental_build:
            enabled: true
        - name: autoware-build
          user: autoware
          workdir: /home/autoware/pilot-auto
          exec: ./.webauto-ci/main/autoware-build/run.sh
          environment_variables:
            PARALLEL_WORKERS: "32"
            CCACHE_DIR: /tmp/build/cache/ccache
            BUILD_LABELS: main simulator tools document
          caches:
            - name: apt-lists
              mountpoint: /var/lib/apt/lists
            - name: apt-archives
              mountpoint: /var/cache/apt/archives
            - name: ccache
              mountpoint: /tmp/build/cache/ccache
          build_result_reuse:
            key_files:
              - .webauto-ci.yml
              - .webauto-ci/main/autoware-build/**/*
              - autoware.repos
              - simulator.repos
              - tools.repos
          incremental_build:
            enabled: true
        - name: asset-deploy
          user: autoware
          workdir: /home/autoware/pilot-auto
          exec: ./.webauto-ci/common/asset-deploy/run.sh
          ml_packages:
            - name: diffusion_planner_for_x2
              release: 20260213_neighbor0.1_epoch0100
            - name: centerpoint
              release: x2/v2.3.1_ADM-AL30_Ubuntu22.04
            # Modify to the version you want to evaluate
            # This model only affects the simulation result, no need to use version with engine files
            - name: yolox
              release: with_unknown/mlmodel/v1.0.1
        - name: ecu-system-setup
          user: autoware
          workdir: /home/autoware/pilot-auto
          exec: ./.webauto-ci/main/ecu-system-setup/run.sh
          environment_variables:
            ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: ansible/playbooks/ecu_setup.yaml
            ECU_ID: main
          caches:
            - name: apt-lists
              mountpoint: /var/lib/apt/lists
            - name: apt-archives
              mountpoint: /var/cache/apt/archives
          build_result_reuse:
            key_files:
              - .webauto-ci.yml
              - .webauto-ci/main/ecu-system-setup/**/*
              - ansible/**/*
              - ansible-galaxy-requirements.yaml
      base_container_image:
        from: ghcr.io/tier4/pilot-auto.x2/base-image:v4.3
      output_container_image:
        from: asset-deploy
        workdir: /home/autoware/pilot-auto
        user: autoware
      output_ota_image:
        annotations:
          vnd.tier4.pilot-auto.platform: x2gen2
          vnd.tier4.pilot-auto.platform.ecu.hardware-model: ADM-AL30
        image_payloads:
          - from: ecu-system-setup
            exclude_config: ./ota/extra_excludes.txt
            sys_configs:
              - ecu_id: autoware
                sys_config: ./ota/main_sys_config.yaml
      output_installer_image:
        from: ecu-system-setup
        type: iso
        base_iso: ubuntu-22.04.3-live-server-amd64
        install_disk: /dev/nvme0n1
        hostname: main

