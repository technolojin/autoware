        sensing: "false"
        use_traffic_light_recognition: "false"
        evaluation_detection_topic_regex: ^/perception/object_recognition/detection/apollo/objects$
        evaluation_prediction_topic_regex: None
        perception_mode: camera_lidar_fusion
        lidar_detection_model: apollo
        with_optional_nodes: 2d_detector
        yolox_model_path: /home/autoware/autoware_data/tensorrt_yolox/yolox-sPlus-T4-960x960-pseudo-finetune.onnx
        yolox_label_path: /home/autoware/autoware_data/tensorrt_yolox/label.txt
