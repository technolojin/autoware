# This is required for Continuous Integration for Autoware using the simulator
# and remote update (Over The Air update) to real cars.
# If you have any additional questions, please contact us at #tier4-dev channel.

# cSpell: ignore annotationless buildspecs

version: 2

artifacts:
  - name: main
    metadata:
      play-ondemand.ci.web.auto/buildspec: Autoware-Humble_v0.29.0
    build:
      type: custom
      runtime:
        type: standard1/amd64/xlarge
      source:
        vcstool:
          repositories_files:
            - autoware.repos
            - simulator.repos
            - tools.repos
          import_path: src
      environment_variables:
        AUTOWARE_PATH: /home/autoware/autoware.proj
        ML_MODELS_PATH: /opt/autoware/mlmodels
        DEBIAN_FRONTEND: noninteractive
        LANG: C.UTF-8
      developer_options:
        - name: webauto:ci:caret_enabled
          environment_variables:
            WEBAUTO_CI_BUILD_OPTION_CARET_ENABLED: ENABLED
      linux_parameters:
        kernel_version: 5.19.0-50-generic
      phases:
        - name: environment-setup
          user: root
          exec: ./.webauto-ci/main/environment-setup/run.sh
          caches:
            - name: apt-lists
              mountpoint: /var/lib/apt/lists
            - name: apt-archives
              mountpoint: /var/cache/apt/archives
          build_result_reuse:
            key_files:
              - .webauto-ci/main/environment-setup/**/*
        - name: autoware-setup
          user: autoware
          exec: ./.webauto-ci/main/autoware-setup/run.sh
          caches:
            - name: apt-lists
              mountpoint: /var/lib/apt/lists
            - name: apt-archives
              mountpoint: /var/cache/apt/archives
          build_result_reuse:
            key_files:
              - .webauto-ci/main/autoware-setup/**/*
              - ansible/**/*
              - ansible-galaxy-requirements.yaml
              - amd64.env
          incremental_build:
            enabled: true
        - name: autoware-build
          user: autoware
          exec: ./.webauto-ci/main/autoware-build/run.sh
          environment_variables:
            PARALLEL_WORKERS: "32"
            CCACHE_DIR: /tmp/build/cache/ccache
          caches:
            - name: apt-lists
              mountpoint: /var/lib/apt/lists
            - name: apt-archives
              mountpoint: /var/cache/apt/archives
            - name: ccache
              mountpoint: /tmp/build/cache/ccache
          build_result_reuse:
            key_files:
              - .webauto-ci/main/autoware-build/**/*
              - src/**/*
              - "!src/ecu_system_setup/**"
          incremental_build:
            enabled: true
        - name: asset-deploy
          user: autoware
          exec: ./.webauto-ci/main/asset-deploy/run.sh
          ml_packages:
            - name: centerpoint
              release: x2/1.1.0
        - name: ecu-system-setup
          user: autoware
          exec: ./.webauto-ci/main/ecu-system-setup/run.sh
          environment_variables:
            ECU_SYSTEM_SETUP_SOURCE_PATH: ansible
            ECU_SYSTEM_SETUP_ANSIBLE_PLAYBOOK: ansible/playbooks/ecu_setup.yaml
          caches:
            - name: apt-lists
              mountpoint: /var/lib/apt/lists
            - name: apt-archives
              mountpoint: /var/cache/apt/archives
          build_result_reuse:
            key_files:
              - .webauto-ci/main/ecu-system-setup/**/*
              - src/ecu_system_setup/**/*
              - ansible/**/*
              - ansible-galaxy-requirements.yaml
      base_container_image:
        from: ghcr.io/tier4/pilot-auto.x2/base-image:latest
      output_container_image:
        from: asset-deploy
        workdir: /home/autoware/autoware.proj
        user: autoware
      output_rootfs_image:
        from: ecu-system-setup
        persistent_file_path: /etc/ota/persistents.txt
      output_installer_image:
        from: ecu-system-setup
        type: iso
        base_iso: ubuntu-22.04.3-live-server-amd64
        install_disk: /dev/nvme0n1
        hostname: main

