        yolox_param_file: yolox_s_plus_opt.param.yaml
        use_bytetrack: "true"
        camera_ids: 0,1,2,3,4,5
        remap_arg: /perception/object_recognition/detection/rois0,/perception/object_recognition/detection/rois1,/perception/object_recognition/detection/rois2,/perception/object_recognition/detection/rois3,/perception/object_recognition/detection/rois4,/perception/object_recognition/detection/rois5
