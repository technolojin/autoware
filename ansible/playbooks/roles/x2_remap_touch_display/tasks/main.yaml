- name: Install wmctrl
  ansible.builtin.apt:
    name:
      - wmctrl
    update_cache: true
  become: true

- name: Create directory for scripts
  ansible.builtin.file:
    path: /opt/autoware/services/remap_touch_display
    state: directory
    mode: 0755
  become: true

- name: Copy scripts
  ansible.builtin.template:
    src: remap_touch_display.sh.j2
    dest: /opt/autoware/services/remap_touch_display/remap_touch_display.sh
    mode: 0755
  become: true

- name: Copy service
  ansible.builtin.copy:
    src: remap_touch_display.service
    dest: /etc/systemd/system/
    mode: 0755
  become: true

- name: Enable service
  ansible.builtin.systemd:
    name: remap_touch_display.service
    daemon_reload: "{{ daemon_reload }}"
    enabled: true
    masked: false
  become: true
