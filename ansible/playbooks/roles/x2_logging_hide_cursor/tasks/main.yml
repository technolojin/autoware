- name: Install unclutter-xfixes
  ansible.builtin.apt:
    name:
      - unclutter-xfixes
    update_cache: true
  become: true

- name: Copy service
  ansible.builtin.copy:
    src: hide_cursor.service
    dest: /etc/systemd/system/
    mode: 0755
  become: true

- name: Enable service
  ansible.builtin.systemd:
    name: hide_cursor.service
    daemon_reload: "{{ daemon_reload }}"
    enabled: true
    masked: false
  become: true
