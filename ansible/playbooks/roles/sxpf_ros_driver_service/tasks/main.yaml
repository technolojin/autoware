# cspell: ignore sxpf
- name: Install the auto start service
  block:
    - name: Copy service
      ansible.builtin.copy:
        src: sxpf-ros-driver.service
        dest: /etc/systemd/system
        mode: 0755
      become: true

    - name: Create directory for run.sh
      ansible.builtin.file:
        path: /opt/autoware/services/sxpf-ros-driver-service/
        state: directory
        mode: 0755
      become: true

    - name: Copy script
      ansible.builtin.template:
        src: run.sh.j2
        dest: /opt/autoware/services/sxpf-ros-driver-service/run.sh
        mode: 0755
      become: true

    - name: Enable service
      ansible.builtin.systemd:
        name: sxpf-ros-driver.service
        daemon_reload: "{{ daemon_reload }}"
        enabled: true
        masked: false
      become: true
