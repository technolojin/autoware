- name: Copy scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /opt/autoware/services/reconnect_touch_display/
    mode: 0755
  with_items:
    - run.sh
  become: true

- name: Copy service
  ansible.builtin.copy:
    src: reconnect_touch_display.service
    dest: /etc/systemd/system/
    mode: 0755
  become: true

- name: Enable service
  ansible.builtin.systemd:
    name: reconnect_touch_display.service
    daemon_reload: "{{ daemon_reload }}"
    enabled: true
    masked: false
  become: true
