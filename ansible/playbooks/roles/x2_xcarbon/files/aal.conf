# cspell: ignore rwxm, orcexec, unarchived, autowaret, cpython, otelcol, cffi
# cspell: ignore AWSCRT, libaws, libnetty, epoll, rwmx
# Policy block declaration syntax:
#
#   :baseline=(<policy-mode>[,<policy-matching-mode>])
#
# "<policy-mode>" option can be one of the two policy modes:
#   "enforce": Enforce mode (default)
#       Blocks violated actions and generates security event messages
#   "complain": Complain mode
#       Generates security event messages but allows violated actions
#
# "<policy-matching-mode>" option can be one of the following:
#   "strict": Strict mode (default mode when not specified)
#       Full policy matching by path and hash
#   "loose": Loose mode
#       Check execution action only and match policy by hash
#
:baseline=(enforce)

# Rule declaration syntax: Add or overwrite rule from collected baseline
#
#   [(<policy-mode>)] <path> [<perm>] [<hash>]
#
# "(<policy-mode>)": Policy mode for the rule. (optional)
#
# "<path>": File path of a policy rule. A file path must begin with a forward
#           slash "/" character.
#   wildcard support
#       "*": Single directory or name matching wildcard
#       "**": Recursive directory wildcard
#
# "<perm>": Rule permissions (optional)
#   "r": read permission
#   "w": write permission
#   "m": load permission (for example, load libc.so.6)
#   "x": executable permission
#   "..": default (rmx for baseline) or exists baseline rule permission
#   empty / "-": empty, no permission specified
#
# "<hash>": rule hash (optional)
#   SHA1 in HEX string: Hash value
#   "[<sha1-hash1>,<sha1-hash2>,..]": Array of multiple hashes
#   "..": default empty or exists baseline rule hash
#   empty / "-": empty, ignore hash check
#
# Example of JIT support:
#   The ORC JIR library generates the JIT code and executes the code in the
#   path "/tmp/orcexec.EBI4eb" (the EBI4eb is random string). The following
#   shows the rule example:
#       "/tmp/orcexec.* rwmx"
#
# Example of specific complain mode for certain rule:
#   Give complain mode for the specific rule, which provides the flexibility
#   to allow the specific application bypass the baseline policy but still
#   generate security event messages:
#       "(complain) /path/to/my_app .. .."
#

# Application policy block declaration syntax:
#
#   :<app-path>=(<policy-mode>[,<policy-matching-mode>])
#   <path> [<perm>] [<hash>]
#   ...
#
# "<app-path>": Application file path for the policy definition, which the app
#               will having its own specific policy block that is overwrite
#               rule from the baseline policy.
#
# Example:
#   You could disable some specific folder access right in the baseline and
#   allow only a application able to access it as following.
#
#   :baseline=(enforce)
#   /my/secret -
#   /my/secret/** -
#
#   :/my/app=(enforce)
#   /my/secret r
#   /my/secret/** r
#

