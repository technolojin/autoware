- name: Ensure ExteVerse config directory exists
  ansible.builtin.file:
    path: "{{ x2_deploy_exteverse_config_target }}"
    state: directory
    mode: "0755"

- name: Deploy exteverse config files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ x2_deploy_exteverse_config_target }}/{{ item | basename }}"
    mode: "0644"
  loop: "{{ lookup('ansible.builtin.fileglob', role_path ~ '/files/*', wantlist=True) }}"
  loop_control:
    label: "{{ item | basename }}"
