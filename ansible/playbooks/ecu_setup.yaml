- name: Include additional playbook for common
  ansible.builtin.import_playbook: pilot_auto.dev_env.ecu_common

- name: Include playbook for development
  ansible.builtin.import_playbook: pilot_auto.dev_env.ecu_develop

- name: Setup ECU by additional roles
  hosts: localhost
  vars_files:
    - ./vars/ecu_setup.yaml
  roles:
    # add your necessary roles
    - { role: autoware.ecu_system_setup.automatic_login }
    - { role: autoware.ecu_system_setup.boot_shutdown_interface }
    - { role: autoware.ecu_system_setup.boot_shutdown_manager }
    - { role: autoware.ecu_system_setup.boot_shutdown_service }
    - { role: autoware.ecu_system_setup.ip_routing_policy }
    - { role: autoware.ecu_system_setup.lenovo_keyboard }
    - { role: autoware.ecu_system_setup.peak_can_mini_pcie }
    - { role: autoware.ecu_system_setup.ptp4l_master }
    - { role: autoware.ecu_system_setup.rootfs_encrypt }
    - { role: autoware.ecu_system_setup.rsyslog }
    - { role: autoware.ecu_system_setup.syslog_collector_client }
    - { role: x2_autoware }
