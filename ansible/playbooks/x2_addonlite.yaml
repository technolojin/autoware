- name: Setup x2 perception
  hosts: localhost
  vars_files:
    - ./vars/x2_common.yaml
    - ./vars/x2_addonlite.yaml

  vars:
    ecu_id: addonlite

  pre_tasks:
    - name: Check 'ecu_id' contents
      ansible.builtin.assert:
        that:
          - ecu_id == 'addonlite'
        fail_msg: ecu_id should be ['addonlite']

    - name: Set addonlite params
      ansible.builtin.set_fact:
        jetson_id: 2
        netplan_files: netplan/99-autoware.x2-addonlite.yaml
        otaclient_ecu_info_yaml: otaclient/ecu_info.yaml.x2-addonlite
        perception_type: od
        dtb_sensor_type: imx490
        distortion_correction: 0

  roles:
    - { role: autoware.ecu_system_setup.boot_shutdown_service }
    - { role: autoware.ecu_system_setup.cyclonedds }
    - { role: autoware.ecu_system_setup.jetson_clocks }
    - { role: autoware.ecu_system_setup.netplan }
    - { role: autoware.ecu_system_setup.otaclient }
    - { role: autoware.ecu_system_setup.evaluator_self_hosted_environment }
    - { role: autoware.ecu_system_setup.ptp4l }
    - { role: autoware.ecu_system_setup.rsyslog }
    - { role: autoware.ecu_system_setup.set_autoware_env }
    - { role: autoware.ecu_system_setup.syslog_collector_client }
    - { role: autoware.ecu_system_setup.timezone }
    - { role: autoware.ecu_system_setup.set_large_txqueue }
    - { role: autoware.ecu_system_setup.rsyncd }
    - { role: autoware.edge_auto_jetson.link_retry_handler }
    - { role: autoware.edge_auto_jetson.sensor_trigger_for_anvil }
    - { role: autoware.edge_auto_jetson.cuda }
    - { role: autoware.edge_auto_jetson.vcstool }
    - { role: autoware.edge_auto_jetson.ros2 }
    - { role: autoware.edge_auto_jetson.cgroups }

  # Any `tasks` defined in the play will be executed after each role listed in `roles`
  # see: https://docs.ansible.com/ansible/latest/playbook_guide/playbooks_reuse_roles.html#using-roles-at-the-play-level
  tasks:
    - name: Setup ECU for Object Recognition or Traffic Light Recognition
      when: skip_od_tlr_setup is not defined or not skip_od_tlr_setup | bool
      block:
        - name: ROS 2 application build
          ansible.builtin.include_role:
            name: autoware.edge_auto_jetson.perception_application

        - name: Setup as object recognition ECU
          when:
            - perception_type == 'od'
          block:
            - name: Download yolox model
              ansible.builtin.include_role:
                name: autoware.ecu_system_setup.download_yolox_model
            - name: TIER IV camera driver
              ansible.builtin.include_role:
                name: autoware.ecu_system_setup.tier4_camera_driver_anvil

        - name: Setup as traffic light recognition ECU
          when:
            - perception_type == 'tlr'
          block:
            - name: Download yolox model
              ansible.builtin.include_role:
                name: autoware.ecu_system_setup.download_yolox_model
            - name: Download tlr model
              ansible.builtin.include_role:
                name: autoware.ecu_system_setup.download_tlr_model
            - name: TIER IV camera driver
              ansible.builtin.include_role:
                name: autoware.ecu_system_setup.tier4_camera_driver_anvil
