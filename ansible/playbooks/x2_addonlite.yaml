- name: Setup x2 perception
  hosts: localhost
  vars_files:
    - ./vars/essential_vars.yaml
    - ./vars/x2_addonlite.yaml

  vars:
    ecu_id: addonlite

  pre_tasks:
    - name: Check 'ecu_id' contents
      ansible.builtin.assert:
        that:
          - ecu_id == 'addonlite'
        fail_msg: ecu_id should be ['addonlite']

    - name: Set addonlite params
      ansible.builtin.set_fact:
        netplan_files: netplan/99-autoware.x2-addonlite.yaml
        otaclient_ecu_info_yaml: otaclient/ecu_info.yaml.x2-addonlite
        dtb_sensor_type: imx490
        distortion_correction: 0
        c2_angle_params: "{{ addonlite_angle_params }}"

  roles:
    - { role: autoware.ecu_system_setup.anomaly_sentinel }
    - role: autoware.ecu_system_setup.boot_shutdown_service
      when: skip_for_github_actions is not defined or not skip_for_github_actions | bool
    - { role: autoware.ecu_system_setup.clean_ros_log }
    - { role: autoware.ecu_system_setup.cyclonedds }
    - { role: autoware.ecu_system_setup.ota_first_boot_flag }
    - { role: autoware.ecu_system_setup.jetson_clocks }
    - { role: autoware.ecu_system_setup.netplan }
    - { role: autoware.ecu_system_setup.otaclient }
    - { role: autoware.ecu_system_setup.evaluator_self_hosted_environment }
    - { role: autoware.ecu_system_setup.pre_journal_collector }
    - { role: autoware.ecu_system_setup.ptp4l }
    - { role: autoware.ecu_system_setup.reload_camera_driver }
    - { role: autoware.ecu_system_setup.rsyslog }
    - { role: autoware.ecu_system_setup.set_autoware_env }
    - { role: autoware.ecu_system_setup.syslog_collector_client }
    - { role: autoware.ecu_system_setup.timezone }
    - { role: autoware.ecu_system_setup.set_large_txqueue }
    - { role: autoware.ecu_system_setup.rsyncd }
    - { role: autoware.ecu_system_setup.link_retry_handler }
    - role: autoware.ecu_system_setup.sensor_trigger_for_anvil
      when: skip_for_github_actions is not defined or not skip_for_github_actions | bool
    - { role: autoware.ecu_system_setup.fool_proof_check } # fool proof check for autoware function
    # - { role: autoware.ecu_system_setup.letterbox_monitor }
    - { role: x2_disable_timesyncd }
    - role: autoware.ecu_system_setup.sync_tooling
      when: skip_for_github_actions is not defined or not skip_for_github_actions | bool
    - role: autoware.ecu_system_setup.c2_fw_autoupdate
      when: skip_for_github_actions is not defined or not skip_for_github_actions | bool
    - { role: autoware.ecu_system_setup.systemd_analyze_collector }
    - { role: autoware.ecu_system_setup.install_system_monitor } # hdd_reader, lm_sensors and traffic_reader are necessary for autoware_system_monitor
    - { role: autoware.ecu_system_setup.hdd_reader }
    - { role: autoware.ecu_system_setup.lm_sensors }
    - { role: autoware.ecu_system_setup.traffic_reader }
    - { role: autoware.ecu_system_setup.jetson_launch }
    - role: autoware.ecu_system_setup.tier4_hdr_camera_driver
      when: skip_for_github_actions is not defined or not skip_for_github_actions | bool
    - { role: autoware.ecu_system_setup.cgroup_nice_setup }
