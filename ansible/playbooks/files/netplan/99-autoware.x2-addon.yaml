network:
  version: 2
  renderer: networkd
  ethernets:
    # 10G BASE-T #1
    # 10GbE SW Hub
    enp7s0:
      optional: false # Linking up of this is essential to avoid cyclonedds errors
      dhcp4: false
      dhcp6: false
      addresses: [192.168.30.33/24]
      mtu: 9000
    # 10G BASE-T #2
    # Perception ECU #2
    enp3s0f1:
      optional: false
      dhcp4: false
      dhcp6: false
      addresses: [192.168.90.33/24]
      mtu: 9000
    # 1G BASE-T
    # 1GbE SW Hub (HMI + PTPv2)
    enp0s31f6:
      optional: false # Linking up of this is essential to avoid PTP instability
      dhcp4: false
      dhcp6: false
      addresses: [192.168.20.33/24]
    # For debugging purpose
    enp3s0f0:
      optional: true
      dhcp4: true
      dhcp6: true

    # Below, we specify `optional: true`` for unused network interfaces to ensure that network-online.target completes quickly.
    enp6s0:
      optional: true
    enp5s0:
      optional: true
