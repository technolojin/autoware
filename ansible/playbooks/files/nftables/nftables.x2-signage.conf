# cspell: ignore dport iifname oifname ruleset
#!/usr/sbin/nft -f
# Packet Filter Settings for X2 In-Vehicle Signage ECU

flush ruleset

define IF_HMI = vlan.500                                            # HMI Network Adapter

define IFs_ROUTER = { vlan.100, vlan.200, vlan.300, vlan.400 }      # Network Adapter Set to Internet Router
define IFs_INTERNAL = { $IF_HMI }                                   # Network Adapter Set to Internal Network

define ALL_PORTS = { 1-65535 }


table inet filter {
  chain input {
    type filter hook input priority 0; policy drop;                 # input default policy drop
      iifname "lo" accept                                           # local loopback accept
      iifname $IFs_INTERNAL accept                                  # Internal network accept
      iifname $IFs_ROUTER ct state { established, related } accept  # LTE Router established/related accept
  }
  chain forward {
    type filter hook forward priority 0;
  }
  chain output {
    type filter hook output priority 0; policy drop;                # output default policy drop
      oifname "lo" accept                                           # local loopback accept
      oifname $IFs_INTERNAL accept                                  # Internal network accept
      oifname $IFs_ROUTER udp dport $ALL_PORTS accept               # Web RTC(UDP Any port), DHCP(UDP:67), DNS(UDP:53) accept
      oifname $IFs_ROUTER tcp dport 443 accept                      # HTTPS accept
      oifname $IFs_ROUTER tcp dport 8443 accept                     # MQTT (FMS data sharing / TCP) accept
      oifname $IFs_ROUTER tcp dport 8883 accept                     # MQTT (FMS data sharing / TCP) accept
      oifname $IFs_ROUTER tcp dport 4711 accept                     # HTTP accept
  }
}
