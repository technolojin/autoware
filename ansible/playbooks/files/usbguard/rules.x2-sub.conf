# Block any devices connected to unused USB ports
block id *:* via-port "1-1"
block id *:* via-port "1-3"
block id *:* via-port "1-4"
block id *:* via-port "2-2"


# Rules for internal USB devices
# xHCI Host Controller(Internally connected)
allow id 1d6b:0002 # for USB 2.0
allow id 1d6b:0003 # for USB 3.0

# CP2105 Dual USB to UART Bridge Controller
# (Internally connected, some of AVA-3510 does not have this device)
allow id 10c4:ea70

# MCP2210 USB to SPI Master(Internally connected)
allow id 04d8:00de


# Rules for external USB devices
# Samsung SSD T5
allow id 04e8:61f5 via-port "2-1" # via Lower USB3.0 port
# SanDisk Extreme SSD
allow id 0781:558c via-port "2-1" # via Lower USB3.0 port
