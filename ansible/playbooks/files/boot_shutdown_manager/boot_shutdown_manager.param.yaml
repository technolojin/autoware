---
/**:
  ros__parameters:
    update_rate: 1.0
    startup_timeout: 60.0
    preparation_timeout: 60.0
    topic_port: 10000
    service_timeout: 1
    managed_ecu:
      main:
        service_address: 192.168.20.11
      logging:
        skip_shutdown: true
      perception1:
        service_address: 192.168.20.31
      perception2:
        service_address: 192.168.20.32
      # when use addon
      addon:
        service_address: 192.168.20.33
      # # when use addonlite
      # addonlite:
      #   service_address: 192.168.20.33
      ms1:
        service_address: 192.168.20.61
      ms2:
        service_address: 192.168.20.62
      signage:
        service_address: 192.168.20.41
      voice_system:
        service_address: 192.168.20.51
      sub:
        service_address: 192.168.20.21
    qos_profile_path: /etc/autoware_logging_suite/logpacker/qos_profile_overrides.yaml
    shutdown_config:
      logic: AND
      /vehicle/status/velocity_status:
        logic: AND
        longitudinal_velocity: { le: 0.0 }
        lateral_velocity: { le: 0.0 }
      #/api/operation_mode/state:
      #  is_autoware_control_enabled: { eq: false }
      /webauto/vehicle_info:
        data: { not_contains: in_progress }
