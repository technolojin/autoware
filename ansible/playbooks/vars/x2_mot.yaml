# cspell: ignore mincho rexmit ipaddr maxsize
# common
daemon_reload: "{{ reload_systemd | default('yes') }}"
ros_domain_id: 1
autoware_install_dir: "{{ ansible_env.HOME }}/OperationMaintenanceTool"
systemctl_default: multi-user.target
autoware_env_dir: "{{ ansible_env.HOME }}"
autoware_env_dir_privileged: false

# timezone
timezone: Asia/Tokyo

# additional-fonts
additional_font_packages:
  - fonts-noto-cjk
  - fonts-takao-mincho

# boot_shutdown_interface
boot_shutdown_interface_param_file: empty_topic_boot_shutdown.param.yaml

# cyclonedds
cyclonedds:
  network_interface_address:
    - eno1
  minimum_socket_receive_buffer_size: 20MB
  minimum_socket_send_buffer_size: default
  max_message_size: 65500B
  fragment_size: 4000B
  max_rexmit_message_size: 1456B # Default value from CycloneDDS documentation
  water_mark_whc_high: 500kB # Default value from CycloneDDS documentation
  water_mark_whc_low: 1kB # Default value from CycloneDDS documentation

# ptp4l port
ptp4l_network_port: eno1

# simple-system-launch
# TODO: The *.*.* will change to the release version in future
simple_system_launch_command: /opt/mot/build/MaintenanceOperationTool-*.*.*.AppImage
simple_system_service_file: mot.service

# netplan
netplan_files: netplan/99-autoware.x2-mot.yaml

# otaclient
otaclient_ecu_info_yaml: otaclient/ecu_info.yaml.x2-mot
otaclient_proxy_info_yaml: otaclient/proxy_info.yaml.x2-mot.j2
# syslog collector
syslog_collector_type: Client
# rsyslog_server_ipaddr: 192.168.30.11 # x2
rsyslog_server_ipaddr: 192.168.30.21 # x2-sub
# rsyslog_server_port: 514
# rsyslog_protocol: tcp
rsyslog_queue_maxsize: 1g

# boot_shutdown
boot_shutdown_service_root: /opt/mot/msg/install/boot_shutdown_service

# log
log_storage_period: -1 month
target_remove_log_dirs:
  - /opt/mot/logs/*
  - /home/autoware/.config/MaintenanceOperationTool/logs/*
