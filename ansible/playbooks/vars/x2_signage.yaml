# cspell: ignore Fonglun ipaddr maxsize mincho momo pactl rexmit
# common
autoware_install_dir: "{{ ansible_env.HOME }}/AutowareSignage"
systemctl_default: multi-user.target

# additional-fonts
additional_font_packages:
  - fonts-noto-cjk
  - fonts-takao-mincho

# keyboard
keyboard_layout_file: keyboard.jp

# ros2-app-build
ros2_app_repository: git@github.com:tier4/AutowareSignage.git
ros2_app_repository_version: d336620a657f0e9cb3d8a0d4b60ce0d7f67fe6c1 # beta/v4.3.1
depends_repos: signage.repos

# cyclonedds
cyclonedds:
  network_interface:
    - { address: vlan.500, priority: default }
  minimum_socket_receive_buffer_size: 20MB
  minimum_socket_send_buffer_size: default
  max_message_size: 65500B
  fragment_size: 4000B
  max_rexmit_message_size: 1456B # Default value from CycloneDDS documentation
  water_mark_whc_high: 500kB # Default value from CycloneDDS documentation
  water_mark_whc_low: 1kB # Default value from CycloneDDS documentation
  lease_duration: 32s
  spdp_interval: 30s

# ptp4l port
ptp4l_network_port: vlan.500
ptp4l_use_software_stamp: false
ptp4l_synchronize_system_clock: true
ptp4l_phc2sys_offset: -37

# fms
fms_url: fms.web.auto
autoware_pc_ip: 192.168.20.11

# x2-call
x2_call_repo: git@github.com:tier4/x2-call.git
x2_call_workspace: "{{ ansible_env.HOME }}/x2-call"
x2_call_location: /opt/x2-call
x2_call_version: 740a74e486530ae067060412e63ede4ae651cdff
momo_release_tags: 2022.2+tier4-4
momo_version: 20.04_x86_64
signage_sink_gen2: true

# netplan
netplan_files: netplan/99-autoware.x2-signage.yaml

# syslog collector - client
syslog_collector_type: Client
rsyslog_server_ipaddr: 192.168.20.71
rsyslog_queue_maxsize: 1g

# otaclient
otaclient_release_version: v3.11.0
otaclient_package_whl_checksum: sha256:17e210f3dc99cfc0ec30cd450222632cdbe4c802b35dad20168bcf0144e8472b
otaclient_manifest_checksum: sha256:197d236a37137afc43ee693ea6e7a907725f28526dca7794b9b27d17a6d612ea
otaclient_ecu_info_yaml: otaclient/ecu_info.yaml.x2-signage
otaclient_proxy_info_yaml: otaclient/proxy_info.yaml.x2-1gbe.j2

# vlan
setup_vlan: true

# systemd_analyze_collector
rsync_target_host_ip: 192.168.20.71

# set_autoware_env
vehicle_id: INVALID_VEHICLE_ID
