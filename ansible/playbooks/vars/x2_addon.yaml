# cspell: ignore mincho rexmit ipaddr maxsize nocaps netcore wmem
# common
systemctl_default: multi-user.target

# additional-fonts
additional_font_packages:
  - fonts-noto-cjk
  - fonts-takao-mincho

# cyclonedds
cyclonedds:
  network_interface:
    - { address: enp7s0, priority: default }
  minimum_socket_receive_buffer_size: 10MB
  minimum_socket_send_buffer_size: 10MB
  max_message_size: 8950B
  fragment_size: 8850B
  max_rexmit_message_size: 8950B
  water_mark_whc_high: 4MB
  water_mark_whc_low: 10kB
ipv4_ipfrag_time: 1
ipv4_ipfrag_high_thresh: 134217728
netcore_rmem_max: 2147483647
netcore_wmem_max:
  2147483647

  # keyboard
keyboard_layout_file: keyboard.jp+ctrl_nocaps

# ptp4l port
ptp4l_network_port: enp0s31f6
ptp4l_use_software_stamp: true

# SYNC.TOOLING
sync_tooling:
  worker:
    ptp4l_units:
      - ptp4l
    phc2sys_units: []

# netplan
netplan_files: netplan/99-autoware.x2-addon.yaml

# otaclient
otaclient_release_version: v3.10.1
otaclient_package_whl_checksum: sha256:6ffa42a92cb964f5bbe57dd7498e9b7994e7598ed7872351a8372a0c9c0a8689
otaclient_manifest_checksum: sha256:41c02224951b1d0cb04c1538a149c45458db1dc39179eb26931bb67288049028
otaclient_ecu_info_yaml: otaclient/ecu_info.yaml.x2-addon
otaclient_proxy_info_yaml: otaclient/proxy_info.yaml.x2-10gbe.j2

# sxpf_ros_driver
sxpf_ros_driver_version: 493f4ddb3d40f828ab7caea4d39e2c6d02928758

# set-autoware-env
autoware_install_dir: /home/autoware/overlay_ws

# perception application/service
perception_application_edge_auto_version: beta/v4.3
perception_application_base_path: /home/autoware
perception_application_edge_auto_repo: git@github.com:tier4/edge-auto-jetson.x2.git
perception_application_service_run_templates_file: perception_application/run.sh.addon.j2 # we can use different run files if the path is in local
perception_application_native_built_ros: false # false when we are installing ROS with apt
perception_application_directory_name: overlay_ws
perception_type: addon

# syslog collector - client
syslog_collector_type: Client
# rsyslog_server_ipaddr: 192.168.30.11 # x2
rsyslog_server_ipaddr: 192.168.30.71 # X2 Logging ECU
# rsyslog_server_port: 514
# rsyslog_protocol: tcp
rsyslog_queue_maxsize: 1g
