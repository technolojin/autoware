# cspell: ignore mincho rexmit ipaddr maxsize nocaps netcore wmem
# common
systemctl_default: multi-user.target
autoware_env_dir: /opt/autoware/env
autoware_env_dir_privileged: true

# additional-fonts
additional_font_packages:
  - fonts-noto-cjk
  - fonts-takao-mincho

# cyclonedds
cyclonedds:
  network_interface:
    - { address: enp7s0, priority: default }
  minimum_socket_receive_buffer_size: 10MB
  minimum_socket_send_buffer_size: 10MB
  max_message_size: 8950B
  fragment_size: 8850B
  max_rexmit_message_size: 8950B
  water_mark_whc_high: 4MB
  water_mark_whc_low: 10kB
  lease_duration: 120s
  spdp_interval: 90s
ipv4_ipfrag_time: 1
ipv4_ipfrag_high_thresh: 134217728
netcore_rmem_max: 2147483647
netcore_wmem_max: 2147483647

# keyboard
keyboard_layout_file: keyboard.jp+ctrl_nocaps

# ptp4l port
ptp4l_network_port: enp0s31f6
ptp4l_use_software_stamp: true

# SYNC.TOOLING
sync_tooling:
  worker:
    ptp4l_units:
      - ptp4l
    phc2sys_units: []

# netplan
netplan_files: netplan/99-autoware.x2-addon.yaml

# otaclient
otaclient_release_version: v3.11.1
otaclient_package_whl_checksum: sha256:70000d775e8a8510d837f320774b88e0d5edd61428c8ad0e53bb9244d4fdc4d4
otaclient_manifest_checksum: sha256:dd08c1792169b72c7136b53949a5c06d0c4f2411fcf2fc3b28856e7e5b768ec2
otaclient_ecu_info_yaml: otaclient/ecu_info.yaml.x2-addon
otaclient_proxy_info_yaml: otaclient/proxy_info.yaml.x2-10gbe.j2

# set-autoware-env
autoware_install_dir: /home/autoware/edge-auto-jetson

# jetson_launch
jetson_launch_id: -1
jetson_launch_run_template: jetson_launch/run.sh.addon.j2
jetson_launch_perception_type: addon
jetson_launch_video_num: 2 # unused for addon

# fool proof check service
fool_proof_check: true
check_target_service: perception-startup.service
fool_proof_check_network_interface: enp7s0

link_retry_handler_ping_dst_ip: 192.168.30.11
link_retry_handler_network_port: enp7s0

# syslog collector - client
syslog_collector_type: Client
# rsyslog_server_ipaddr: 192.168.30.11 # x2
rsyslog_server_ipaddr: 192.168.30.71 # X2 Logging ECU
# rsyslog_server_port: 514
# rsyslog_protocol: tcp
rsyslog_queue_maxsize: 1g
# letterbox_monitor
letterbox_monitor:
  - service_name: default
    ros_log_dir: /home/autoware/.ros/log
    user_name: autoware
    group_name: autoware
    use_call_diag: false
    use_letterbox: false
    ignore_node_names: []
  - service_name: recognition
    ros_log_dir: /home/autoware/.ros/recognition_log
    user_name: autoware
    group_name: autoware
    use_call_diag: true
    use_letterbox: false
    ignore_node_names: []
  - service_name: camera_driver
    ros_log_dir: /home/autoware/.ros/sxpf_ros_driver_log
    user_name: autoware
    group_name: autoware
    use_call_diag: true
    use_letterbox: false
    ignore_node_names: []

# c2_fw_autoupdate
c2_ecu_type: addon
fw_rom_version: 20240927
addon_angle_params: (120 120 120)
# TODO(someone): decouple sxpf_ros_driver from this role
sxpf_ros_driver_workspace: "{{ autoware_install_dir }}"

# systemd_analyze_collector
rsync_target_host_ip: 192.168.20.71

# rsyncd - server for logpacker coredump plugin
# rsyncd - add systemd-tmpfiles configuration for logpacker coredump plugin
setup_coredump_rsyncd_service: true
rsyncd_hosts_allow: 192.168.30.71 # X2 Logging ECU
setup_coredump_tmpfiles_service: true

# set_autoware_env
vehicle_id: INVALID_VEHICLE_ID

# tier4_service_standby_wait
service_list_for_tier4_system: |
  ptp4l.service
service_list_for_tier4_autoware: |
  boot-shutdown.service \
  fool-proof-check.service \
  tier4_system_standby_wait.target
network_interface_for_tier4_service_standby_wait: enp7s0
# disable services
# cspell:ignore runlevel utmp
disable_system_service_list:
  - systemd-update-utmp-runlevel.service
