#     use_call_diag: false
#     use_letterbox: false
#     ignore_node_names: []
#   - service_name: recognition
#     ros_log_dir: "{{ perception_application_base_path }}/.ros/recognition_log"
#     user_name: autoware
#     group_name: autoware
#     use_call_diag: true
#     use_letterbox: false
#     ignore_node_names: []

# c2_fw_autoupdate
c2_ecu_type: addon
fw_rom_version: 20240927
addon_angle_params: (120 120 120)

# systemd_analyze_collector
rsync_target_host_ip: 192.168.20.71
