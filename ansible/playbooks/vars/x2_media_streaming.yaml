# cspell: ignore dustynv ipaddr libpython maxsize rexmit compat
# common
is_in_docker: "{{ daemon_reload == 'no' }}"

autoware_env_dir: /opt/autoware/env
autoware_env_dir_privileged: true
xx1_logging_ecu: false

# syslog collector - client
syslog_collector_type: Client
# rsyslog_server_ipaddr: 192.168.30.11 # x2
rsyslog_server_ipaddr: 192.168.20.71 # X2 Logging ECU 1Gb eth
# rsyslog_server_port: 514
# rsyslog_protocol: tcp
rsyslog_queue_maxsize: 1g

# otaclient
otaclient_release_version: v3.13.0
otaclient_package_whl_checksum: sha256:00831b0572a5be33a2349f7865da06d31e514be2d411bd95d89c9f19b25b5996
otaclient_manifest_checksum: sha256:ff002837125cfb9b20df11badc107d8bbd98fafe5b2d0710992d5d712c5b9cb1
# otaclient_ecu_info_yaml: otaclient/ecu_info.yaml.x2-media-streaming
otaclient_proxy_info_yaml: otaclient/proxy_info.yaml.x2-1gbe.j2

# media_streaming
media_streaming:
  install_docker: false
  required_python: python3.8
  required_libpython: libpython3.8

# reload_camera_driver
camera_num: 4
target_service_before_reload_camera_driver: media.service

# systemd_analyze_collector
rsync_target_host_ip: 192.168.20.71

# set_autoware_env
vehicle_id: INVALID_VEHICLE_ID
network_interface_for_tier4_service_standby_wait: vlan.500
ecu_type: media_streaming
# disable services
# cspell:ignore runlevel utmp
disable_system_service_list:
  - systemd-update-utmp-runlevel.service
  - motd-news.timer
  - dpkg-db-backup.timer
  - apt-daily-upgrade.timer
  - apt-daily.timer
  - ModemManager
  - tier4_ros2_standby_wait
