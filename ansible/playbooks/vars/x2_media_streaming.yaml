# cspell: ignore dustynv ipaddr maxsize rexmit
# common
daemon_reload: "{{ reload_systemd | default('yes') }}"
is_in_docker: "{{ daemon_reload == 'no' }}"

ros_domain_id: 1
autoware_env_dir: /opt/autoware/env
autoware_env_dir_privileged: true
xx1_logging_ecu: false

# syslog collector - client
syslog_collector_type: Client
# rsyslog_server_ipaddr: 192.168.30.11 # x2
rsyslog_server_ipaddr: 192.168.30.21 # x2-sub
# rsyslog_server_port: 514
# rsyslog_protocol: tcp
rsyslog_queue_maxsize: 1g

# cyclonedds
cyclonedds:
  network_interface_address:
    - vlan.500
  minimum_socket_receive_buffer_size: 20MB
  minimum_socket_send_buffer_size: default
  max_message_size: 65500B
  fragment_size: 4000B
  max_rexmit_message_size: 1456B # Default value from CycloneDDS documentation
  water_mark_whc_high: 500kB # Default value from CycloneDDS documentation
  water_mark_whc_low: 1kB # Default value from CycloneDDS documentation

# iptables
iptables_ipv4_conf_file: iptables/rules.x2.media-streaming.v4
iptables_ipv6_conf_file: iptables/rules.x2.media-streaming.v6
# nftables (media streaming ECU uses iptables)
# nftables_conf_file: nftables.x2-media-streaming.conf

# netplan
netplan_files: netplan/99-autoware.x2-media-streaming.yaml

# ota-client ecu_info.yaml
ota_client_install_dir: /opt/ota/client
ecu_info_yaml: ota_client/ecu_info.yaml.x2-media-streaming
proxy_info_yaml: ota_client/proxy_info.yaml.x2-mot.j2 # x2-mot setting can be used since on the same network
ota_client_log_server_port: 8083
python_executable: python3.8

# boot_shutdown
boot_shutdown_interface_run_script: run.sh.docker.jinja2
boot_shutdown_interface_service_file: boot-shutdown-interface.docker.service
boot_shutdown_service_root: /usr/local
boot_shutdown_docker_name: "{{ 'ghcr.io/tier4/object-recognition:x2' if is_in_docker else 'dustynv/ros:galactic-ros-base-l4t-r32.6.1' }}"
