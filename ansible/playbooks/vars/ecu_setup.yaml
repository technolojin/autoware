# cSpell:ignore ipaddr maxsize

# syslog collector - client
syslog_collector_type: Client
rsyslog_server_ipaddr: 192.168.30.71 # X2 Logging ECU
rsyslog_queue_maxsize: 1g
rsyslog_replace_enable: true # for 5G router syslog
rsyslog_template_file: rsyslog.conf.j2 # for 5G router syslog, enable UDP

# rsyncd - server for logpacker coredump plugin
# rsyncd - add systemd-tmpfiles configuration for logpacker coredump plugin
setup_coredump_rsyncd_service: true
rsyncd_hosts_allow: 192.168.30.71 # X2 Logging ECU
setup_coredump_tmpfiles_service: true

# param_diff_uploader
setup_param_diff_uploader: true

# systemd_analyze_collector
rsync_target_host_ip: 192.168.30.71

# configure marvell switch
x2_configure_marvell_switch_board_config_file: bd_cfg_main.xml
x2_configure_marvell_switch_file: X2_J6_Gen2_Main_Marvell.xml

# ptp4l
x2_ptp4l_ecu: main

# SYNC.TOOLING
sync_tooling:
  worker:
    ptp4l_units:
      - ptp4l@enp3s0
      - ptp4l@vlan.500
    phc2sys_units:
      - phc2sys_sys_to_enp3s0
      - phc2sys_sys_to_enp5s0f0
  master:
    config: sync_tooling/config.yaml
    update_expiry_s: 5

# redundancy switcher
redundancy_switcher_repository_url: git@github.com:tier4/redundancy_switcher.git
redundancy_switcher_clone_dir: /tmp/redundancy_switcher
redundancy_switcher_version: v1.0.0
redundancy_switcher_install_dir: /opt/redundancy_switcher/bin
redundancy_switcher_conf_install_dir: /opt/redundancy_switcher/conf
redundancy_switcher_conf_files: redundancy_switcher/node_info.yaml
redundancy_switcher_service_template: redundancy_switcher.service.jinja2
node_id: 0

# letterbox_monitor
letterbox_monitor:
  - service_name: default
    ros_log_dir: /home/autoware/.ros/log
    user_name: autoware
    group_name: autoware
    use_call_diag: false
    use_letterbox: true
    ignore_node_names: []
  - service_name: autoware
    ros_log_dir: /home/autoware/.ros/autoware_main_log
    user_name: autoware
    group_name: autoware
    use_call_diag: true
    use_letterbox: true
    ignore_node_names: []
  - service_name: autoware_system
    ros_log_dir: /home/autoware/.ros/autoware_system_log
    user_name: autoware
    group_name: autoware
    use_call_diag: true
    use_letterbox: true
    ignore_node_names: []
  - service_name: autoware_main_mrm
    ros_log_dir: /home/autoware/.ros/autoware_main_mrm_log
    user_name: autoware
    group_name: autoware
    use_call_diag: true
    use_letterbox: true
    ignore_node_names: []

# simple_system_launch
simple_system_launch_items:
  # autoware_main_launch
  - file: simple_system_launch/autoware_main_launch.service
    command: |
      mkdir -p /home/autoware/.ros/autoware_main_log
      export ROS_LOG_DIR=/home/autoware/.ros/autoware_main_log
      CENTERPOINT_ENGINE_DIR="/opt/autoware/mlmodels/centerpoint"
      if [ -z "$(find "$CENTERPOINT_ENGINE_DIR" -maxdepth 1 -type f -name "*.engine" -print -quit)" ]; then
        echo "[$(date '+%Y-%m-%d %H:%M:%S')] Starting centerpoint model build..."
        START_TIME=$(date +%s)
        ros2 launch autoware_lidar_centerpoint lidar_centerpoint.launch.xml \
                model_name:=centerpoint \
                model_path:=/opt/autoware/mlmodels/centerpoint \
                model_param_path:=$(ros2 pkg prefix autoware_launch --share)/config/perception/object_recognition/detection/lidar_model/centerpoint.param.yaml \
                build_only:=true 2>&1 | tee "$HOME"/autoware_centerpoint_model_build.log
        END_TIME=$(date +%s)
        ELAPSED_TIME=$((END_TIME - START_TIME))
        echo "[$(date '+%Y-%m-%d %H:%M:%S')] Centerpoint model build completed. Elapsed time: ${ELAPSED_TIME}s ($((ELAPSED_TIME / 60))m $((ELAPSED_TIME % 60))s)"
      fi
      ros2 launch autoware_launch autoware.main.launch.xml \
              is_redundant:="true" \
              map_path:=/opt/autoware/maps \
              lanelet2_map_file:=lanelet2_map.osm \
              pointcloud_map_file:=pcd \
              vehicle_model:="$VEHICLE_MODEL" \
              sensor_model:="$SENSOR_MODEL" \
              v2x_location:="$V2X_LOCATION" \
              launch_system:=false \
              rviz:=false 2>&1 | tee "$HOME"/autoware_main.log

  # system
  - file: simple_system_launch/autoware_system_launch.service
    command: |
      mkdir -p /home/autoware/.ros/autoware_system_log
      export ROS_LOG_DIR=/home/autoware/.ros/autoware_system_log
      ros2 launch autoware_launch tier4_system_component.launch.xml \
            is_redundant:="true" \
            use_control_command_gate:="true" \
            system_run_mode:=online \
            launch_system_monitor:=true \
            launch_dummy_diag_publisher:=false \
            sensor_model:="$SENSOR_MODEL" 2>&1 | tee "$HOME"/autoware_system.log

  # autoware_main_mrm_launch
  - file: simple_system_launch/autoware_main_mrm_launch.service
    command: |
      mkdir -p /home/autoware/.ros/autoware_main_mrm_log
      export ROS_LOG_DIR=/home/autoware/.ros/autoware_main_mrm_log
      export ROS_DOMAIN_ID=3
      ros2 launch autoware_launch autoware.main.mrm.launch.xml \
            vehicle_model:="$VEHICLE_MODEL" \
            sensor_model:="$SENSOR_MODEL" 2>&1 | tee "$HOME"/autoware_main_mrm.log

# fool proof check service
check_target_service: autoware_system_launch.service
fool_proof_check_network_interface: enp5s0f1 # TODO: check vlan.500

# tier4_service_standby_wait
service_list_for_tier4_system: |
  ptp4l@enp3s0.service \
  ptp4l@vlan.500.service \
  ptp4l_hw_timestamp@vlan.500.service
service_list_for_tier4_autoware: |
  fool-proof-check.service \
  emergency-vehicle-detector.service \
  boot-shutdown.service \
  letterbox_monitor@autoware.service \
  letterbox_monitor@autoware_system.service \
  letterbox_monitor@default.service \
  tier4_system_standby_wait.target
network_interface_for_tier4_service_standby_wait: enp5s0f1
# disable services
# cspell:ignore runlevel utmp
disable_system_service_list:
  - snapd.apparmor.service
  - snapd.socket
  - snapd.service
  - snapd.seeded.service
  - systemd-update-utmp-runlevel.service
  - update-notifier-download.timer
  - update-notifier-motd.timer
  - motd-news.timer
  - dpkg-db-backup.timer
  - apt-daily-upgrade.timer
  - apt-daily.timer

mask_user_service_list:
  - tracker-extract-3.service
  - tracker-miner-fs-3.service
  - tracker-miner-rss-3.service
  - tracker-writeback-3.service
  - tracker-xdg-portal-3.service
  - tracker-miner-fs-control-3.service

# scheduling settings
scheduling_settings_autoware_yaml_file: scheduling_settings/scheduling_settings_autoware.yaml
scheduling_settings_others_yaml_file: scheduling_settings/scheduling_settings_others.yaml

# tc_bandwidth_limit
tc_interface: enp5s0f1

# boot_shutdown
boot_shutdown_service_config_file: boot_shutdown_service/boot_shutdown.param.main.yaml

# set_autoware_env
vehicle_id: INVALID_VEHICLE_ID
