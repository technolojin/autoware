# cSpell:ignore ipaddr maxsize

# syslog collector - client
syslog_collector_type: Client
rsyslog_server_ipaddr: 192.168.30.71 # X2 Logging ECU
rsyslog_queue_maxsize: 1g

# rsyncd - server for logpacker coredump plugin
# rsyncd - add systemd-tmpfiles configuration for logpacker coredump plugin
setup_coredump_rsyncd_service: true
rsyncd_hosts_allow: 192.168.30.71 # X2 Logging ECU
setup_coredump_tmpfiles_service: true

# boot shutdown
boot_shutdown_tools_clone_dir: "{{ autoware_install_dir }}/src/product/boot_shutdown_tools"
# boot shutdown manager
# use parameter file in pilot-auto repository
boot_shutdown_manager_param_file: boot_shutdown_manager/boot_shutdown_manager.param.yaml

# configure marvell switch
x2_configure_marvell_switch_board_config_file: bd_cfg_main.xml
x2_configure_marvell_switch_file: X2_J6_Gen2_Main_Marvell.xml

# ptp4l
x2_ptp4l_ecu: main

# redundancy switcher
redundancy_switcher_repository_url: git@github.com:tier4/redundancy_switcher.git
redundancy_switcher_clone_dir: /tmp/redundancy_switcher
redundancy_switcher_version: main
redundancy_switcher_install_dir: /opt/redundancy_switcher/bin
redundancy_switcher_conf_install_dir: /opt/redundancy_switcher/conf
redundancy_switcher_conf_files: redundancy_switcher/node_info.json
redundancy_switcher_service_template: redundancy_switcher.service.jinja2
node_id: 0

# simple_system_launch
simple_system_launch_items:
  # autoware_launch
  - file: simple_system_launch/autoware_launch.service
    command: |
      ros2 launch autoware_launch autoware.launch.xml \
            vehicle_model:="$VEHICLE_MODEL" \
            sensor_model:="$SENSOR_MODEL" \
            vehicle_id:="$VEHICLE_ID" \
            map_path:="/opt/autoware/maps" \
            launch_api:=false \
            launch_localization:=false \
            launch_map:=false \
            launch_sensing:=false \
            launch_vehicle:=false \
            launch_pointcloud_container:=false \
            launch_system:=false \
            rviz:=false
  # api
  - file: simple_system_launch/autoware_api_launch.service
    command: |
      ros2 launch autoware_launch tier4_autoware_api_component.launch.xml \
            vehicle_model:="$VEHICLE_MODEL"
  # localization
  - file: simple_system_launch/autoware_localization_launch.service
    command: |
      ros2 launch autoware_launch tier4_localization_component.launch.xml \
            system_run_mode:=online
  # map
  - file: simple_system_launch/autoware_map_launch.service
    command: |
      ros2 launch autoware_launch tier4_map_component.launch.xml \
            map_path:=/opt/autoware/maps \
            pointcloud_map_file:=pcd \
            lanelet2_map_file:=lanelet2_map.osm
  # pointcloud_container
  - file: simple_system_launch/pointcloud_container.service
    command: |
      ros2 launch autoware_launch pointcloud_container.launch.py \
            use_multithread:=true \
            pointcloud_container_name:=pointcloud_container
  # sensing
  - file: simple_system_launch/autoware_sensing_launch.service
    command: |
      ros2 launch autoware_launch tier4_sensing_component.launch.xml \
            sensor_model:="$SENSOR_MODEL" \
            vehicle_model:="$VEHICLE_MODEL" \
            vehicle_id:="$VEHICLE_ID" \
            launch_sensing_driver:=true \
            pointcloud_container_name:=pointcloud_container
  # system
  - file: simple_system_launch/autoware_system_launch.service
    command: |
      ros2 launch autoware_launch tier4_system_component.launch.xml \
            system_run_mode:=online \
            launch_system_monitor:=true \
            launch_dummy_diag_publisher:=false \
            sensor_model:="$SENSOR_MODEL"
  # vehicle
  - file: simple_system_launch/autoware_vehicle_launch.service
    command: |
      ros2 launch tier4_vehicle_launch vehicle.launch.xml \
            sensor_model:="$SENSOR_MODEL" \
            vehicle_model:="$VEHICLE_MODEL" \
            vehicle_id:="$VEHICLE_ID" \
            launch_vehicle_interface:=true \
            config_dir:={{ autoware_install_dir }}/install/individual_params/share/individual_params/config/$VEHICLE_ID/$SENSOR_MODEL
