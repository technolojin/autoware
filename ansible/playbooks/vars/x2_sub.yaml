# cSpell:ignore rexmit nocaps ipaddr maxsize

# cyclonedds
# NOTE: Cyclonedds settings for Sub ECU is not determined yet. Only 1GbE interface is used for now.
cyclonedds:
  network_interface:
    - { address: enp5s0f1, priority: 1 } # Prioritize 10Gb interface
    - { address: enp5s0f0, priority: 0 }
  minimum_socket_receive_buffer_size: 20MB
  minimum_socket_send_buffer_size: default
  max_message_size: 65500B
  fragment_size: 4000B
  max_rexmit_message_size: 1456B
  water_mark_whc_high: 500kB
  water_mark_whc_low: 1kB
  lease_duration: 120s
  spdp_interval: 90s
ipv4_ipfrag_time: 1
ipv4_ipfrag_high_thresh: 134217728
netcore_rmem_max: 2147483647
netcore_wmem_max: 2147483647

# netplan
netplan_files: netplan/99-autoware.x2-sub.yaml

# otaclient
otaclient_release_version: v3.13.2
otaclient_package_whl_checksum: sha256:84c714886d8c17add0ed6e613a753274f017a4476b20784609117299ddfc75a7
otaclient_manifest_checksum: sha256:83083c803296985ad7b116f5194ea95131756f2cd87308e7d5dc9347914145dd
otaclient_ecu_info_yaml: otaclient/ecu_info.yaml.x2-sub
otaclient_proxy_info_yaml: otaclient/proxy_info.yaml.x2-1gbe.j2

# ========== ecu_setup.yaml ==========

# syslog collector - client
syslog_collector_type: Client
# rsyslog_server_ipaddr: 192.168.30.71 # X2 Logging ECU (10GB Eth)
rsyslog_server_ipaddr: 192.168.20.71 # X2 Logging ECU (1GB Eth)
rsyslog_queue_maxsize: 1g

# rsyncd - server for logpacker coredump plugin
# rsyncd - add systemd-tmpfiles configuration for logpacker coredump plugin
setup_coredump_rsyncd_service: true
rsyncd_hosts_allow: 192.168.20.71 # X2 Logging ECU (1GB Eth)
setup_coredump_tmpfiles_service: true

# configure marvell switch
x2_configure_marvell_switch_board_config_file: bd_cfg_sub.xml
x2_configure_marvell_switch_file: X2_J6_Gen2_Sub_Marvell.xml

# ptp4l
x2_ptp4l_ecu: sub

# SYNC.TOOLING
sync_tooling:
  worker:
    ptp4l_units:
      - ptp4l@enp3s0
      - ptp4l@enp5s0f0
    phc2sys_units:
      - phc2sys_enp5s0f0_to_sys
      - phc2sys_enp5s0f0_to_enp3s0

# rviz
rviz_config_path: "{{ autoware_install_dir }}/install/autoware_launch/share/autoware_launch/rviz/autoware_x2.rviz"
rviz_launch_file_name: autoware_sub_rviz.launch.xml
rviz_launch_method: autoware_launch
rviz_default_service_enabled: true

# screen_recorder
screen_recorder_default_logging_directory: /var/tmp/screen_recorder
screen_recorder_default_display_variable: :0
screen_recorder_default_service_enabled: false
screen_recorder_retention_days: 3

# redundancy switcher
redundancy_switcher_repository_url: git@github.com:tier4/redundancy_switcher.git
redundancy_switcher_clone_dir: /tmp/redundancy_switcher
redundancy_switcher_version: v4.4.0
redundancy_switcher_install_dir: /opt/redundancy_switcher/bin
redundancy_switcher_conf_install_dir: /opt/redundancy_switcher/conf
redundancy_switcher_conf_files: redundancy_switcher/node_info.yaml
redundancy_switcher_service_template: redundancy_switcher.service.jinja2
node_id: 1

# fool proof check service
check_target_service: autoware_sub_launch.service
fool_proof_check_network_interface: enp5s0f0 # TODO: check vlan.500
fool_proof_check_additional_command: | # Set ROS_DOMAIN_ID for redundancy
  export ROS_DOMAIN_ID=2

# letterbox_monitor
letterbox_monitor:
  - service_name: default
    ros_log_dir: /home/autoware/.ros/log
    user_name: autoware
    group_name: autoware
    use_call_diag: false
    use_letterbox: false
    ignore_node_names: []
  - service_name: autoware
    ros_log_dir: /home/autoware/.ros/autoware_sub_log
    user_name: autoware
    group_name: autoware
    use_call_diag: true
    use_letterbox: true
    ignore_node_names: []

# tier4_service_standby_wait
service_list_for_tier4_system: |
  ptp4l@enp3s0.service \
  ptp4l@enp5s0f0.service
service_list_for_tier4_autoware: |
  boot-shutdown.service \
  letterbox_monitor@autoware.service \
  letterbox_monitor@default.service \
  fool-proof-check.service \
  tier4_system_standby_wait.target
# disable services
# cspell:ignore runlevel utmp
disable_system_service_list:
  - snapd.apparmor.service
  - snapd.socket
  - snapd.service
  - snapd.seeded.service
  - systemd-update-utmp-runlevel.service
  - update-notifier-download.timer
  - update-notifier-motd.timer
  - motd-news.timer
  - dpkg-db-backup.timer
  - apt-daily-upgrade.timer
  - apt-daily.timer
## In the L2 version, enp5s0f1 of the Sub ECU is not connected, so it needs to be changed to enp5s0f0.
network_interface_for_tier4_service_standby_wait: enp5s0f1

# simple_system_launch
simple_system_launch_items:
  # autoware_sub_launch
  - file: simple_system_launch/autoware_sub_launch.service
    command: |
      mkdir -p /home/autoware/.ros/autoware_sub_log
      export ROS_LOG_DIR=/home/autoware/.ros/autoware_sub_log
      export ROS_DOMAIN_ID=2
      ros2 launch autoware_launch autoware.sub.launch.xml \
              vehicle_model:="$VEHICLE_MODEL" \
              sensor_model:="$SENSOR_MODEL" 2>&1 | tee "$HOME"/autoware_sub.log

# systemd_analyze_collector
rsync_target_host_ip: 192.168.20.71

# set_autoware_env
vehicle_id: INVALID_VEHICLE_ID

# status dashboard
status_dashboard_kiosk_browser_url: http://192.168.20.71:3000
# anomaly_sentinel
anomaly_sentinel_check_commands_list_append:
  - output_file_name: nvidia_smi
    script: nvidia_smi
    args: []
    description: NVIDIA GPU Information (nvidia-smi)

anomaly_sentinel_version_items_append:
  - name: nvidia_smi_list
    description: NVIDIA GPU List (nvidia-smi -L)
    script: nvidia_smi_list
    args: []
  - name: nvidia_driver_version
    description: NVIDIA driver version (/proc/driver/nvidia/version)
    script: nvidia_driver_version
    args: []

# Autoware Viewer Switcher
autoware_viewer_switcher_add_to_favorites: true

# x2_systemd_networkd
x2_systemd_networkd_wait_online_interface_list: [enp5s0f0]
x2_systemd_networkd_wait_online_timeout: 0
x2_systemd_networkd_waiting_for_interface_list: [enp3s0, enp4s0]
x2_systemd_networkd_waiting_for_interface_timeout: 0
x2_systemd_networkd_carrier_only_interface_list: [enp3s0]

# install_system_monitor
system_monitor_param_file: system_monitor/system_monitor.x2-sub.param.yaml
