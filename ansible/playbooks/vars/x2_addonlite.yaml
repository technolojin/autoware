#   - service_name: recognition
#     ros_log_dir: "{{ perception_application_base_path }}/.ros/recognition_log"
#     user_name: autoware
#     group_name: autoware
#     use_call_diag: true
#     use_letterbox: false
#     ignore_node_names: []

# c2_fw_autoupdate
c2_ecu_type: anvil
fw_rom_version: 20240927
addonlite_angle_params: (120 120 120)

# reload_camera_driver
camera_num: 3
target_service_before_reload_camera_driver: perception-startup.service
