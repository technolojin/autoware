# cspell: ignore mincho rexmit ipaddr maxsize nocaps netcore wmem
# common
rosbag_logging_directory: /mnt/ROSBAG
systemctl_default: multi-user.target

# additional-fonts
additional_font_packages:
  - fonts-noto-cjk
  - fonts-takao-mincho

# cyclonedds
cyclonedds:
  network_interface:
    - { address: enp3s0f0, priority: default }
    - { address: enp8s0, priority: default }
  minimum_socket_receive_buffer_size: 10MB
  minimum_socket_send_buffer_size: 10MB
  max_message_size: 8950B
  fragment_size: 8850B
  max_rexmit_message_size: 8950B
  water_mark_whc_high: 4MB
  water_mark_whc_low: 10kB
ipv4_ipfrag_time: 1
ipv4_ipfrag_high_thresh: 134217728
netcore_rmem_max: 2147483647
netcore_wmem_max:
  2147483647

  # keyboard
keyboard_layout_file: keyboard.jp+ctrl_nocaps

# ptp4l port
ptp4l_network_port: enp8s0

# netplan
netplan_files: netplan/99-autoware.x2-logging.yaml

# otaclient
otaclient_release_version: v3.8.4
otaclient_package_whl_checksum: sha256:c118f7ce69bce85b7a038dd7829ca8567f665cf8f86772a6e773e77ac3b3e8fe
otaclient_ecu_info_yaml: otaclient/ecu_info.yaml.x2-logging
otaclient_proxy_info_yaml: otaclient/proxy_info.yaml.x2-10gbe.j2

# log
log_storage_period: -1 month
target_remove_log_dirs:
  - /opt/mot/logs/*
  - /home/autoware/.config/MaintenanceOperationTool/logs/*

# autoware logging suite
autoware_logging_suite_version: v0.8.0
autoware_logging_suite_modules:
  - autoware_logging_msgs
  - logpacker
  - bagkeeper
  - bagkeeper_interfaces
  - bagrollbacker
  - bagtaker
  - dssad_packer
# - logpacker
logpacker_config_template: logpacker/logpacker_config_x2.yaml.jinja2
# - logpacker - syslog plugin
logpacker_enable_syslog_plugin: true
# - logpacker - rosbag plugin
logpacker_enable_rosbag_plugin: true
qos_profile_overrides_template: logpacker/qos_profile_overrides_x2.yaml
# - bagtaker
rosbag_copy_directory: /media/autoware/ROSBAG
bagtaker_params_template: bagtaker2/bagtaker_params_x2.yaml.jinja2
# - bagkeeper
bagkeeper_params_template: bagkeeper/bagkeeper_params_x2.yaml.jinja2

# boot_shutdown
build_boot_shutdown_api_msgs: true
boot_shutdown_tools_clone_dir: "{{ autoware_install_dir }}/src/product/boot_shutdown_tools"
boot_shutdown_service_config_file: boot_shutdown_service/boot_shutdown.param.logging.yaml

# mot_env_setup
mot_repository_version_humble: 6d45abb983f6fd05b2e0024c43b0a197766b2374 # beta/v4.2.0
mot_install_dir: "{{ ansible_env.HOME }}/OperationMaintenanceTool"
depends_node_version: v20.18.1
replace_install_setup_bash: false
bridge_ip_address: 127.0.0.1
fms_agent_ip_address: 192.168.30.11
zoom_level: 1
mot_vehicle_model: j6-gen2

# release_rosbag_page_cache
release_page_cache_threshold_second_from: 65
release_page_cache_threshold_second_to: 130
release_page_cache_timer: minutely

# pyrocan
pyrocan_interface: pcan1
pyrocan_after_this_service: can-logging.service

# MOB Proxy
logagent_mob_proxy_address: 192.168.20.11:18090
# autoware_logging_suite/logagent
logagent_config_template: logagent/logagent_config_x2.yaml.jinja2
logagent_logging_suite_version: v0.8.0
# logging directory
logagent_rosbag_logging_directory: "{{ rosbag_logging_directory }}"
logagent_rosbag_logging_directory_mountpoint: "{{ logagent_rosbag_logging_directory }}"

# fool proof check service
fool_proof_check: true
check_target_service: logpacker.service
ecu_type: logging
fool_proof_check_network_interface: enp3s0f0
