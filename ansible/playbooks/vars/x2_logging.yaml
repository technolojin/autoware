# simple system launch
simple_system_launch_items:
  - file: simple_system_launch/vehicle_info_monitor.service
    command: |
      STOP_STATUS=("in_progress" "failure")
      LOGGING_MODE="/etc/autoware_logging_suite/logpacker/logging_mode"
      TARGET_VALUE="event"
      prev_status=""

      ros2 topic echo -f /webauto/vehicle_info |
      while read -r line; do

        json=$(echo "$line" | sed -n "s/^data: '\(.*\)'$/\1/p")
        if [ -z "$json" ]; then
          continue
        fi

        current_status=$(echo "$json" | jq -r '.firmware_deployment_status')

        if [ ! -f "$LOGGING_MODE" ]; then
          echo "File not found: $LOGGING_MODE"
          continue
        fi

        if [ "$(cat "$LOGGING_MODE")" = "$TARGET_VALUE" ]; then
          if [[ -n "$current_status" && "$current_status" != "$prev_status" ]]; then
            echo "firmware_deployment_status changed: $prev_status -> $current_status"

            if [[ " ${STOP_STATUS[*]} " == *" $current_status "* ]]; then
              systemctl is-active --quiet bagkeeper.service && systemctl stop bagkeeper.service
            else
              ! systemctl is-active --quiet bagkeeper.service && systemctl start bagkeeper.service
            fi

            prev_status="$current_status"
          fi
        fi
      done

# tier4_service_standby_wait
service_list_for_tier4_system: ptp4l.service
service_list_for_tier4_autoware: |
  fool-proof-check.service \
  boot-shutdown.service \
  tier4_system_standby_wait.target
network_interface_for_tier4_service_standby_wait: enp3s0f0
# disable services
# cspell:ignore runlevel utmp
disable_system_service_list:
  - systemd-update-utmp-runlevel.service
  - update-notifier-download.timer
  - update-notifier-motd.timer
  - motd-news.timer
  - dpkg-db-backup.timer
  - apt-daily-upgrade.timer
  - apt-daily.timer

### metric_agent
# metric_agent node parameters
metric_agent_rate_in_hertz: 10
metric_agent_pubs_rate_in_hertz: 10
metric_agent_subs_rate_in_hertz: 10

# metric_agent config
metric_agent_version: 2a64b8ccc5e042ca87abaa692205f18da8ba3d77 # develop # Future references will be by tags or SHAs.
metric_agent_params_template: metric_agent/metric_agent_params_x2.yaml.jinja2
metric_agent_config_template: metric_agent/metric_agent_config_uds_x2.yaml.jinja2
metric_agent_product_config_template: metric_agent/product_metric_config_x2.yaml.jinja2 # If you want to manage all metrics derived from specific topic-type topics
# metric_agent_product_metric_list: /vars/x2_product_metric_list.yaml # If you only want to product common metrics

# telegraf config for metric_agent
metric_agent_telegraf_service_config_template: metric_agent/telegraf.socket_listener_uds_x2.conf.jinja2
metric_agent_telegraf_hostname: logging_ecu
metric_agent_telegraf_otel_hostname: ${AGENT_HOSTNAME}

# set_autoware_env
vehicle_id: INVALID_VEHICLE_ID

# set services' order
sync_tooling_wait_for_services:
  - tier4_ros2_standby_wait.target
bagkeeper_wait_for_services:
  - tier4_autoware_standby_wait.target
bagtaker_wait_for_services:
  - tier4_autoware_standby_wait.target
logagent_wait_for_services:
  - tier4_autoware_standby_wait.target
logpacker_wait_for_services:
  - tier4_autoware_standby_wait.target
mot_wait_for_services:
  - tier4_autoware_standby_wait.target
metric_agent_wait_for_services:
  - tier4_autoware_standby_wait.target
  - tier4_system_standby_wait.target
rosbag_watchdog_wait_for_services:
  - tier4_autoware_standby_wait.target
