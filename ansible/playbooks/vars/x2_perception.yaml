# cspell: ignore ipaddr prptocol maxsize rexmit compat
# common
daemon_reload: "{{ reload_systemd | default('yes') }}"
autoware_env_dir: /opt/autoware/env
autoware_env_dir_privileged: true

# cyclonedds
cyclonedds:
  network_interface_address:
    - eth1
  minimum_socket_receive_buffer_size: 20MB
  minimum_socket_send_buffer_size: default
  max_message_size: 65500B
  fragment_size: 4000B
  max_rexmit_message_size: 1456B # Default value from CycloneDDS documentation
  water_mark_whc_high: 500kB # Default value from CycloneDDS documentation
  water_mark_whc_low: 1kB # Default value from CycloneDDS documentation

# jetson-perception-service
jetson_id: 0
ros_domain_id: 1
vehicle_id: default
vehicle_model: j6_gen1
sensor_model: aip_x2

# timezone
timezone: Asia/Tokyo

# ptp4l port
ptp4l_network_port: eth1

# netplan
netplan_files: netplan/99-autoware.x2-perception.yaml

# otaclient
otaclient_ecu_info_yaml: otaclient/ecu_info.yaml.x2-perception
otaclient_proxy_info_yaml: otaclient/proxy_info.yaml.x2-perception.j2
otaclient_bionic_compat: true

# syslog collector - client
syslog_collector_type: Client
# rsyslog_server_ipaddr: 192.168.20.11 # x2
rsyslog_server_ipaddr: 192.168.20.21 # x2-sub
# rsyslog_server_port: 514
# rsyslog_tcp_prptocol: tcp
rsyslog_queue_maxsize: 1g

# boot_shutdown
boot_shutdown_interface_param_file: boot_shutdown_interface/boot_shutdown.param.perception.yaml
boot_shutdown_service_root: /usr/local

# set-autoware-env
autoware_install_dir: /opt/ros/overlay_ws
